<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦場の衛生兵</title>
    <style>
        * { margin: 0; padding: 0; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }
        canvas { border: 3px solid #333; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="360" height="640"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 360, H = 640;

        const player = {
            x: W/2-8, y: H-80, w: 16, h: 20, vx: 0, vy: 0, jmpPower: 11,
            onGround: true, canDJ: false, hp: 5, maxHp: 5, boots: false, inv: 0, frame: 0
        };

        let state = 'start', stage = 1, scroll = 0, scrollSpeed = 2.5, time = 0;
        let stageTimes = [300, 280, 260], score = 0, rescued = 0;
        let totalRescued = parseInt(localStorage.getItem('bf_total')) || 0;
        let highScore = parseInt(localStorage.getItem('bf_high')) || 0;
        let obs = [], inj = [], items = [], particles = [];

        function playSound(freq, dur) {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const o = ac.createOscillator(), g = ac.createGain();
                o.connect(g); g.connect(ac.destination);
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + dur);
                o.start(ac.currentTime); o.stop(ac.currentTime + dur);
            } catch(e) {}
        }

        function particle(x, y, c, n) {
            for (let i = 0; i < n; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*4-1, c, l: 30, ml: 30});
            }
        }

        canvas.addEventListener('click', () => {
            if (state === 'start') { state = 'playing'; scroll = 0; time = 0; return; }
            if (state === 'stageclear' && stage < 3) { stage++; reset(); return; }
            if (state === 'stageclear' && stage === 3) {
                totalRescued += rescued; if (score > highScore) highScore = score;
                localStorage.setItem('bf_total', totalRescued); localStorage.setItem('bf_high', highScore);
                location.reload(); return;
            }
            if (state === 'gameover') { location.reload(); return; }
            if (state === 'playing') {
                if (player.onGround) { player.vy = -player.jmpPower; player.onGround = false; player.canDJ = false; playSound(400, 0.1); }
                else if (player.boots && !player.canDJ) { player.vy = -player.jmpPower; player.canDJ = true; playSound(500, 0.1); }
            }
        });

        function reset() {
            state = 'playing'; scroll = 0; time = 0; score = 0; rescued = 0;
            obs = []; inj = []; items = []; particles = [];
            player.hp = 5; player.boots = false; player.y = H-80; player.vy = 0;
        }

        function update() {
            if (state !== 'playing') return;
            time++; player.frame++;

            // スクロール（前進）
            scroll += scrollSpeed;

            // プレイヤー重力
            player.vy += 0.6;
            player.y += player.vy;
            if (player.y + player.h >= H-10) {
                player.y = H-10-player.h;
                player.vy = 0;
                player.onGround = true;
                player.canDJ = false;
            } else {
                player.onGround = false;
            }

            player.inv = Math.max(0, player.inv - 1);

            // ギミック生成（スクロール位置ベース）
            let genPos = scroll + H;
            if (stage === 1) {
                while (obs.length === 0 || obs[obs.length-1].sy < genPos + 100) {
                    if (Math.random() < 0.6) {
                        obs.push({
                            sx: Math.random()*(W-40), sy: obs.length === 0 ? genPos : obs[obs.length-1].sy + Math.random()*80+40,
                            w: 40, h: 40, t: 'exp'
                        });
                    } else {
                        obs.push({
                            sx: Math.random()*(W-40), sy: obs.length === 0 ? genPos : obs[obs.length-1].sy + Math.random()*80+40,
                            w: 40, h: 40, t: 'exp'
                        });
                    }
                }
            }
            // ステージ2以降も同様

            if (time % (180-stage*20) === 0) {
                inj.push({sx: Math.random()*(W-16), sy: scroll+H, w: 16, h: 16, res: false});
            }

            if (time % 300 === 0 && Math.random() < 0.5) {
                items.push({sx: Math.random()*(W-12), sy: scroll+H, w: 12, h: 12, t: 'boots'});
            }

            // 衝突判定
            obs.forEach((o, i) => {
                let oy = o.sy - scroll;
                if (player.inv <= 0 && player.x < o.sx+o.w && player.x+player.w > o.sx &&
                    player.y < oy+o.h && player.y+player.h > oy) {
                    player.hp--; player.boots = false; player.inv = 30;
                    particle(player.x+player.w/2, player.y+player.h/2, '#ff4444', 10);
                    playSound(100, 0.2);
                    obs.splice(i, 1);
                }
            });

            items.forEach((it, i) => {
                let ity = it.sy - scroll;
                if (player.x < it.sx+it.w && player.x+player.w > it.sx &&
                    player.y < ity+it.h && player.y+player.h > ity) {
                    player.boots = true;
                    particle(it.sx, ity, '#ffff00', 8);
                    items.splice(i, 1);
                }
            });

            inj.forEach(i => {
                let iy = i.sy - scroll;
                if (player.x < i.sx+i.w && player.x+player.w > i.sx &&
                    player.y < iy+i.h && player.y+player.h > iy && !i.res) {
                    i.res = true; rescued++; score += 100;
                    particle(i.sx+i.w/2, iy+i.h/2, '#00ff00', 12);
                    playSound(800, 0.3);
                }
            });

            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.l--;
                return p.l > 0;
            });

            if (player.hp <= 0) {
                state = 'gameover';
                totalRescued += rescued;
                if (score > highScore) highScore = score;
                localStorage.setItem('bf_total', totalRescued);
                localStorage.setItem('bf_high', highScore);
            }

            let timeLeft = stageTimes[stage-1] - Math.floor(time/60);
            if (timeLeft <= 0) state = 'stageclear';
        }

        function drawChar(x, y) {
            let frame = Math.floor(player.frame / 8) % 4;
            // 衛生兵: 緑ユニフォーム
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(x+4, y, 8, 12);
            // 赤十字（胸部）
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x+6, y+4, 2, 4);
            ctx.fillRect(x+5, y+5, 4, 2);
            // 頭
            ctx.fillStyle = '#ffcc99';
            ctx.fillRect(x+5, y-4, 6, 4);
            // 脚（走行アニメ）
            let legOff = Math.sin(frame * Math.PI / 2) * 2;
            ctx.fillStyle = '#000000';
            ctx.fillRect(x+4, y+12+legOff, 2, 3);
            ctx.fillRect(x+10, y+12-legOff, 2, 3);
            // ブーツ
            if (player.boots) {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(x+3, y+15, 10, 2);
            }
        }

        function draw() {
            // 背景: 戦場
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, W, H);

            // スクロール背景（瓦礫）
            ctx.fillStyle = '#1a1a2a';
            let bgOffset = scroll % 60;
            for (let i = -1; i < 15; i++) {
                ctx.fillRect(50, i*60-bgOffset, 80, 30);
                ctx.fillRect(200, i*60-bgOffset+30, 80, 30);
            }

            // 砲撃跡
            ctx.fillStyle = '#333333';
            for (let i = 0; i < 8; i++) {
                ctx.fillRect(Math.sin(scroll*0.02+i)*60+100, i*100-scroll%100, 50, 40);
            }

            // 血痕
            ctx.fillStyle = 'rgba(255, 50, 50, 0.1)';
            for (let i = 0; i < 6; i++) {
                ctx.fillRect(Math.cos(i)*100+150, i*120-scroll%120, 60, 40);
            }

            // ギミック描画
            obs.forEach(o => {
                let oy = o.sy - scroll;
                if (oy > -50 && oy < H) {
                    if (o.t === 'exp') {
                        ctx.fillStyle = '#ff6600';
                        ctx.fillRect(o.sx, oy, o.w, o.h);
                        ctx.fillStyle = '#ffaa00';
                        ctx.fillRect(o.sx+4, oy+4, o.w-8, o.h-8);
                    }
                }
            });

            // 負傷兵描画
            inj.forEach(i => {
                let iy = i.sy - scroll;
                if (iy > -20 && iy < H && !i.res) {
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(i.sx+2, iy, 4, 6);
                    ctx.fillRect(i.sx, iy+6, 8, 4);
                    ctx.fillRect(i.sx+1, iy+10, 3, 4);
                    ctx.fillRect(i.sx+4, iy+10, 3, 4);
                }
            });

            // アイテム描画
            items.forEach(it => {
                let ity = it.sy - scroll;
                if (ity > -15 && ity < H) {
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(it.sx, ity, it.w, it.h);
                }
            });

            // パーティクル
            particles.forEach(p => {
                ctx.globalAlpha = p.l / p.ml;
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x-1, p.y-1, 2, 2);
            });
            ctx.globalAlpha = 1;

            // プレイヤー描画
            if (player.inv % 10 < 5) drawChar(player.x, player.y);

            // UI
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`STAGE ${stage}`, 10, 20);
            let timeLeft = Math.max(0, stageTimes[stage-1] - Math.floor(time/60));
            ctx.fillText(`TIME ${timeLeft}s`, 10, 35);
            ctx.fillText(`HP:${player.hp}/${player.maxHp}`, 10, 50);
            ctx.fillText(`RESCUED:${rescued}`, 10, 65);
            ctx.textAlign = 'right';
            ctx.fillText(`SCORE:${score}`, W-10, 20);
            ctx.fillText(`HIGH:${highScore}`, W-10, 35);

            // ゲーム状態
            if (state === 'start' || state === 'gameover' || state === 'stageclear') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 18px monospace';

                if (state === 'start') {
                    ctx.fillText('戦場の衛生兵', W/2, H/2-30);
                    ctx.font = '12px monospace';
                    ctx.fillText('武器を持たず、人を助ける', W/2, H/2+5);
                    ctx.fillText('CLICK TO START', W/2, H/2+35);
                } else if (state === 'gameover') {
                    ctx.fillText('GAME OVER', W/2, H/2-20);
                    ctx.font = '14px monospace';
                    ctx.fillText(`RESCUED:${rescued} SCORE:${score}`, W/2, H/2+15);
                    ctx.fillText('CLICK TO RESTART', W/2, H/2+50);
                } else if (state === 'stageclear') {
                    ctx.fillText('STAGE CLEAR', W/2, H/2-20);
                    ctx.font = '14px monospace';
                    ctx.fillText(`RESCUED:${rescued} SCORE:${score}`, W/2, H/2+15);
                    if (stage < 3) ctx.fillText('CLICK FOR NEXT', W/2, H/2+50);
                    else ctx.fillText('MISSION COMPLETE', W/2, H/2+50);
                }
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
