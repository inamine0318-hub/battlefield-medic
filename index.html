<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>戦場の衛生兵</title>
    <style>
        * { margin:0; padding:0; }
        html,body { width:100%; height:100%; background:#000; overflow:hidden; }
        body { display:flex; justify-content:center; align-items:center; }
        canvas { display:block; image-rendering:pixelated; touch-action:none; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = 540, H = 960;
cv.width = W; cv.height = H;

function resize() {
    const s = Math.min(innerWidth/W, innerHeight/H);
    cv.style.width  = Math.floor(W*s)+'px';
    cv.style.height = Math.floor(H*s)+'px';
}
addEventListener('resize', resize); resize();

// ── 定数 ──────────────────────────────────────
const GY = H - 130;           // 地面Y（地表面）
const PX = Math.floor(W*0.28); // プレイヤー固定X

// ── 状態 ──────────────────────────────────────
const P = { x:PX, y:GY-72, w:44, h:72, vy:0, onG:true, dj:false,
             hp:5, mhp:5, boots:false, inv:0, fr:0 };
const JMP=19, GR=0.75;

let gs='start', stage=1, scroll=0, spd=3.5, t=0;
let score=0, rescued=0;
let totR = parseInt(localStorage.getItem('bf_total'))||0;
let best = parseInt(localStorage.getItem('bf_high'))||0;
let obs=[], inj=[], items=[], parts=[], smokes=[];
let shake=0, flash=0, rtxt=null, combo=0, ctmr=0, ctxt=null;
let heliP=22000, heliR=false, dmg=0, gmsg='', safeZ=0;
const GOALS=[2,3,5];

// ── サウンド ───────────────────────────────────
function snd(freq,dur) {
    try {
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value=freq;
        g.gain.setValueAtTime(0.1,ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        o.start(); o.stop(ac.currentTime+dur);
    } catch(e){}
}

function spark(x,y,c,n) {
    for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,c,l:35,ml:35});
}

// ── 入力 ──────────────────────────────────────
function inp() {
    if(gs==='start'){stage=1;rst();return;}
    if(gs==='stageclear'){if(stage<3){stage++;rst();}else{save();location.reload();}return;}
    if(gs==='gameover'){location.reload();return;}
    if(gs==='playing'){
        if(P.onG){P.vy=-JMP;P.onG=false;P.dj=false;snd(380,.12);}
        else if(P.boots&&!P.dj){P.vy=-JMP*.85;P.dj=true;snd(520,.12);}
    }
}
cv.addEventListener('click',inp);
cv.addEventListener('touchstart',e=>{e.preventDefault();inp();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();inp();}});

function rst() {
    gs='playing'; scroll=0; t=0; score=0; rescued=0;
    obs=[]; inj=[]; items=[]; parts=[]; smokes=[];
    P.hp=5; P.boots=false; P.y=GY-P.h; P.vy=0; P.onG=true;
    P.inv=0; P.fr=0; combo=0; ctmr=0;
    heliP=22000; heliR=false; shake=0; flash=0; dmg=0; gmsg='';
    safeZ=heliP-2500;
}
function save() {
    totR+=rescued; if(score>best) best=score;
    localStorage.setItem('bf_total',totR); localStorage.setItem('bf_high',best);
}

// ── UPDATE ────────────────────────────────────
function update() {
    if(gs!=='playing') return;
    t++; P.fr++; scroll+=spd;
    P.vy+=GR; P.y+=P.vy;
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}
    else P.onG=false;
    P.inv=Math.max(0,P.inv-1);

    const gx=scroll+W, dist=heliP-scroll, safe=scroll>=safeZ;
    if(dist<3500&&dist>2500) gmsg='避難ポイント接近';
    else if(dist<2500&&dist>1500) gmsg='ヘリが見えた！';
    else if(dist<1500&&dist>0) gmsg='全力で走れ！';
    else gmsg='';

    if(!safe) {
        const df=1+(scroll/heliP)*.8;
        if(t%Math.max(28,Math.floor(70/df))===0) {
            const r=Math.random();
            if(r<.6)        obs.push({sx:gx,sy:GY-58,w:52,h:52,t:'exp'});
            else if(r<.8&&stage>=2) obs.push({sx:gx,sy:GY-52,w:W*.5,h:24,t:'mg'});
            else if(stage>=3)       obs.push({sx:gx,sy:GY-42,w:44,h:42,t:'wire'});
        }
        const ii=Math.max(50,Math.floor((160-stage*15)/df));
        if(t%ii===0) inj.push({sx:gx,sy:GY-42,w:40,h:42,res:false});
        if(t%280===0&&Math.random()<.5) items.push({sx:gx,sy:GY-52,w:26,h:26});
    }

    // 当たり判定（スクリーン座標で統一）
    obs.forEach((o,i)=>{
        if(P.inv>0) return;
        const dx=o.sx-scroll;
        if(P.x<dx+o.w&&P.x+P.w>dx&&P.y<o.sy+o.h&&P.y+P.h>o.sy) {
            P.hp--;P.boots=false;P.inv=30;P.vy=-10;dmg++;
            shake=10;flash=18;spark(dx+o.w/2,o.sy+o.h/2,'#ff8800',20);
            snd(90,.3);obs.splice(i,1);
        }
    });
    items.forEach((it,i)=>{
        const dx=it.sx-scroll;
        if(P.x<dx+it.w&&P.x+P.w>dx&&P.y<it.sy+it.h&&P.y+P.h>it.sy) {
            P.boots=true;spark(dx+it.w/2,it.sy,'#ffff00',12);items.splice(i,1);snd(660,.15);
        }
    });
    inj.forEach(s=>{
        if(s.res) return;
        const dx=s.sx-scroll;
        if(P.x<dx+s.w&&P.x+P.w>dx&&P.y<s.sy+s.h&&P.y+P.h>s.sy) {
            s.res=true;rescued++;combo++;ctmr=120;
            const mul=Math.min(5,Math.floor(combo/2)+1);
            score+=100*mul;shake=4;
            rtxt={x:dx+s.w/2,y:s.sy,t:30,mul};
            if(combo>1) ctxt={x:W/2,y:90,t:45,n:combo};
            spark(dx+s.w/2,s.sy+s.h/2,'#00ff88',18);snd(780,.35);
        }
    });

    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.l--;return p.l>0;});
    if(rtxt&&--rtxt.t<=0) rtxt=null;
    if(--ctmr<=0) combo=0;
    if(ctxt&&--ctxt.t<=0) ctxt=null;
    shake*=.8;

    if(t%45===0&&Math.random()<.4)
        smokes.push({x:W,y:60+Math.random()*(GY*.4),l:80,r:30+Math.random()*40});
    smokes=smokes.filter(s=>{s.x-=spd*.6;s.l--;s.r+=.4;return s.l>0&&s.x>-100;});

    if(P.hp<=0){save();gs='gameover';}
    if(heliP-scroll<=PX+P.w&&!heliR) {
        heliR=true;
        if(rescued>=GOALS[stage-1]){gs='stageclear';flash=25;spark(PX,GY-200,'#00ff00',40);snd(880,.5);}
        else{save();gs='gameover';}
    }
    obs=obs.filter(o=>o.sx>scroll-100);
    inj=inj.filter(s=>s.sx>scroll-100);
    items=items.filter(it=>it.sx>scroll-100);
}

// ── 背景描画 ──────────────────────────────────
function drawBg() {
    // 空グラデーション
    const sg=ctx.createLinearGradient(0,0,0,GY);
    if(stage===1){sg.addColorStop(0,'#0a0a20');sg.addColorStop(.7,'#1a1a35');sg.addColorStop(1,'#2a1a10');}
    else if(stage===2){sg.addColorStop(0,'#080810');sg.addColorStop(.6,'#101020');sg.addColorStop(1,'#201010');}
    else{sg.addColorStop(0,'#050510');sg.addColorStop(.4,'#100808');sg.addColorStop(1,'#251005');}
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);

    // 地平線グロー
    const hg=ctx.createLinearGradient(0,GY-100,0,GY);
    hg.addColorStop(0,'rgba(0,0,0,0)');
    hg.addColorStop(1,stage===3?'rgba(180,40,0,.45)':'rgba(100,40,0,.25)');
    ctx.fillStyle=hg; ctx.fillRect(0,GY-100,W,100);

    // 遠景：山シルエット（0.15x パラックス、W幅でタイル）
    const moff=(scroll*.15)%W;
    ctx.fillStyle=stage===1?'#1a2040':stage===2?'#141520':'#1e1010';
    for(let i=-1;i<3;i++) {
        const mx=i*W-moff;
        ctx.beginPath();
        ctx.moveTo(mx,GY-50);
        ctx.lineTo(mx+W*.12,GY-165); ctx.lineTo(mx+W*.28,GY-88);
        ctx.lineTo(mx+W*.45,GY-205); ctx.lineTo(mx+W*.62,GY-118);
        ctx.lineTo(mx+W*.80,GY-175); ctx.lineTo(mx+W,GY-60);
        ctx.lineTo(mx+W,GY); ctx.lineTo(mx,GY);
        ctx.closePath(); ctx.fill();
    }

    // 中景：廃墟（0.4x パラックス、324px幅でタイル）
    const btw=Math.floor(W*.6), boff=(scroll*.4)%btw;
    ctx.fillStyle=stage===1?'#1c2435':stage===2?'#181520':'#201510';
    for(let i=-1;i<4;i++) {
        const bx=i*btw-boff, bh=55+(i*41+150)%55;
        ctx.fillRect(bx,GY-bh,44,bh);
        ctx.fillRect(bx+8,GY-bh-18,20,18);
        ctx.fillRect(bx+32,GY-bh-26,14,26);
        ctx.fillStyle='rgba(0,0,0,.5)';
        ctx.fillRect(bx+5,GY-bh+10,10,10); ctx.fillRect(bx+22,GY-bh+10,10,10);
        ctx.fillRect(bx+5,GY-bh+28,10,10); ctx.fillRect(bx+22,GY-bh+28,10,10);
        ctx.fillStyle=stage===1?'#1c2435':stage===2?'#181520':'#201510';
    }

    // 煙
    ctx.globalAlpha=.3; ctx.fillStyle='#888';
    smokes.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;

    // 地面塗り（画面最下部）
    const gg=ctx.createLinearGradient(0,GY,0,H);
    if(stage===1){gg.addColorStop(0,'#c8a060');gg.addColorStop(1,'#7a5030');}
    else if(stage===2){gg.addColorStop(0,'#4a3820');gg.addColorStop(1,'#2a1808');}
    else{gg.addColorStop(0,'#686868');gg.addColorStop(1,'#383838');}
    ctx.fillStyle=gg; ctx.fillRect(0,GY,W,H-GY);

    // 地面ライン
    ctx.fillStyle=stage===1?'#d4a870':stage===2?'#5a4428':'#787878';
    ctx.fillRect(0,GY,W,4);

    // 地面クレーター（1x速）
    const goff=scroll%190;
    ctx.fillStyle=stage===1?'#a07840':stage===2?'#2e1e0e':'#505050';
    for(let i=-1;i<W/190+2;i++) {
        const gx=i*190-goff;
        ctx.beginPath(); ctx.ellipse(gx,GY+18,22,7,0,0,Math.PI*2); ctx.fill();
    }

    // 地面小道具（0.95x速）
    if(stage===1) {
        ctx.fillStyle='#8b7355';
        const off=scroll*.95%210;
        for(let i=-1;i<W/210+2;i++){const sx=i*210-off;ctx.fillRect(sx,GY-22,34,22);ctx.fillRect(sx+4,GY-34,26,14);}
    } else if(stage===2) {
        ctx.fillStyle='#5a3a1a';
        const off=scroll*.95%260;
        for(let i=-1;i<W/260+2;i++){const sx=i*260-off;ctx.fillRect(sx,GY-42,7,42);ctx.fillRect(sx-14,GY-30,36,6);}
    } else {
        ctx.fillStyle='#4a4a4a';
        const off=scroll*.95%170;
        for(let i=-1;i<W/170+2;i++){const sx=i*170-off;ctx.fillRect(sx,GY-16,22,16);ctx.fillRect(sx+4,GY-25,12,10);}
    }
}

// ── キャラクター描画 ──────────────────────────
function drawMedic(x,y) {
    const f=Math.floor(P.fr/6)%4, leg=[0,6,0,-6][f];
    const aL=[[-7,0],[0,7],[7,0],[0,-7]][f];

    // 影
    ctx.globalAlpha=.2;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(x+22,GY+4,18,5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    // 脚
    ctx.fillStyle='#2a2a1a';
    ctx.fillRect(x+10,y+50+leg,9,22); ctx.fillRect(x+24,y+50-leg,9,22);
    ctx.fillStyle='#111';
    ctx.fillRect(x+8,y+70,13,5); ctx.fillRect(x+22,y+70,13,5);

    // 胴体
    ctx.fillStyle='#4a6a2a';ctx.fillRect(x+7,y+22,30,28);
    ctx.fillStyle='#3a5a1a';ctx.fillRect(x+7,y+36,30,5);

    // 腕（アニメーション）
    ctx.fillStyle='#3a5a1a';
    ctx.fillRect(x+aL[0],y+24,8,18); ctx.fillRect(x+36+aL[1],y+24,8,18);

    // 医療バッグ
    ctx.fillStyle='#8b6f47';ctx.fillRect(x+34,y+20,14,22);
    ctx.fillStyle='#ff0000';ctx.fillRect(x+39,y+24,2,10);ctx.fillRect(x+35,y+27,10,3);

    // 首・顔
    ctx.fillStyle='#c8a06a';ctx.fillRect(x+18,y+14,8,10);
    ctx.fillStyle='#d4aa74';ctx.fillRect(x+13,y+2,18,14);
    ctx.fillStyle='#000';ctx.fillRect(x+16,y+7,2,3);ctx.fillRect(x+24,y+7,2,3);

    // ヘルメット＋赤十字
    ctx.fillStyle='#eee';
    ctx.beginPath();ctx.arc(x+22,y+3,12,0,Math.PI,true);ctx.fill();
    ctx.fillRect(x+10,y+3,24,4);
    ctx.fillStyle='#ff0000';ctx.fillRect(x+21,y,3,7);ctx.fillRect(x+18,y+2,9,3);

    // HPドット
    for(let i=0;i<P.mhp;i++) {
        ctx.fillStyle=i<P.hp?'#ff2222':'#441111';ctx.fillRect(x+i*9,y-14,7,7);
        ctx.strokeStyle=i<P.hp?'#ff8888':'#220000';ctx.lineWidth=1;ctx.strokeRect(x+i*9,y-14,7,7);
    }
    if(P.boots){ctx.fillStyle='#ffff00';ctx.globalAlpha=.8;ctx.fillRect(x+7,y+74,14,3);ctx.fillRect(x+22,y+74,14,3);ctx.globalAlpha=1;}
}

function drawInjured(x,y) {
    ctx.fillStyle='#4a6a2a';ctx.fillRect(x,y+14,36,17);
    ctx.fillStyle='#c8a06a';ctx.fillRect(x-10,y,17,15);
    ctx.fillStyle='#000';ctx.fillRect(x-5,y+5,2,3);ctx.fillRect(x+2,y+5,2,3);
    ctx.fillStyle='#2a2a1a';ctx.fillRect(x+34,y+16,11,9);
    ctx.fillStyle='#ff0000';ctx.fillRect(x+14,y+14,3,13);ctx.fillRect(x+10,y+18,10,4);
    ctx.strokeStyle='#ffaaaa';ctx.lineWidth=1;ctx.strokeRect(x+9,y+13,12,15);
    if(Math.floor(t/12)%2===0){ctx.fillStyle='#ff4444';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('救助!',x+16,y-5);}
}

function drawObs() {
    obs.forEach(o=>{
        const dx=o.sx-scroll;
        if(dx<-100||dx>W+100) return;
        if(o.t==='exp') {
            ctx.shadowColor='#ff4400';ctx.shadowBlur=8;
            ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(dx+o.w/2,o.sy+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.ellipse(dx+o.w/2,o.sy+o.h/2,o.w*.34,o.h*.34,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffff88';ctx.beginPath();ctx.ellipse(dx+o.w/2,o.sy+o.h/2,o.w*.16,o.h*.16,0,0,Math.PI*2);ctx.fill();
            ctx.shadowBlur=0;
        } else if(o.t==='mg') {
            ctx.shadowColor='#ffff00';ctx.shadowBlur=6;
            ctx.fillStyle='#ff5500';ctx.fillRect(dx,o.sy-2,o.w,o.h+4);
            for(let i=0;i<12;i++){ctx.fillStyle=i%2?'#ffcc00':'#ff6600';ctx.fillRect(dx+i*(o.w/12),o.sy,o.w/12-1,o.h);}
            ctx.strokeStyle='#ffff00';ctx.lineWidth=2;ctx.strokeRect(dx,o.sy-2,o.w,o.h+4);ctx.shadowBlur=0;
        } else {
            ctx.shadowColor='#cc00cc';ctx.shadowBlur=5;
            ctx.fillStyle='#880088';ctx.fillRect(dx,o.sy,o.w,o.h);
            ctx.fillStyle='#ff44ff';
            for(let i=0;i<4;i++) for(let j=0;j<3;j++) ctx.fillRect(dx+i*10,o.sy+j*13,3,3);
            ctx.strokeStyle='#ff00ff';ctx.lineWidth=1.5;ctx.strokeRect(dx,o.sy,o.w,o.h);ctx.shadowBlur=0;
        }
    });
}

function drawHeli() {
    const hx=heliP-scroll;
    if(hx<-300||hx>W+200) return;
    const hy=GY-240,hw=130,hh=55;

    ctx.globalAlpha=.1;ctx.fillStyle='#00ff00';
    ctx.beginPath();ctx.arc(hx,hy+hh/2,170,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    ctx.fillStyle='#00bb00';ctx.fillRect(hx-hw/2,hy,hw,hh);
    ctx.fillStyle='#009900';ctx.fillRect(hx-hw/2,hy+hh*.6,hw,hh*.4);
    ctx.fillStyle='#0088ff';ctx.fillRect(hx-hw*.28,hy+10,hw*.5,hh*.42);
    ctx.fillStyle='#002244';ctx.fillRect(hx-hw*.2,hy+16,14,11);ctx.fillRect(hx+hw*.04,hy+16,14,11);
    ctx.fillStyle='#008800';ctx.fillRect(hx+hw*.4,hy+hh*.2,hw*.48,hh*.25);

    ctx.strokeStyle='#444';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(hx-hw*.72,hy-38);ctx.lineTo(hx+hw*.72,hy-38);ctx.stroke();
    ctx.strokeStyle='#555';ctx.lineWidth=2;
    const ba=(t/4)%Math.PI;
    for(let i=0;i<2;i++){const a=ba+i*Math.PI;ctx.beginPath();ctx.moveTo(hx+Math.cos(a)*hw*.7,hy-38+Math.sin(a)*16);ctx.lineTo(hx-Math.cos(a)*hw*.7,hy-38-Math.sin(a)*16);ctx.stroke();}
    ctx.strokeStyle='#333';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(hx,hy-38);ctx.lineTo(hx,hy);ctx.stroke();
    ctx.strokeStyle='#555';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(hx-hw*.4,hy+hh);ctx.lineTo(hx+hw*.4,hy+hh);ctx.stroke();
    ctx.strokeStyle='#aaa';ctx.lineWidth=2;
    for(let r=-1;r<=1;r++){ctx.beginPath();ctx.moveTo(hx+r*30,hy+hh);ctx.lineTo(hx+r*30,GY);ctx.stroke();}

    if(Math.floor(t/8)%2===0){
        ctx.shadowColor='#ff0000';ctx.shadowBlur=10;ctx.fillStyle='#ff3333';
        ctx.beginPath();ctx.arc(hx-hw*.44,hy+hh*.85,6,0,Math.PI*2);ctx.fill();
        ctx.shadowColor='#00ff00';ctx.fillStyle='#33ff33';
        ctx.beginPath();ctx.arc(hx+hw*.44,hy+hh*.85,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.fillStyle='#ffff00';ctx.textAlign='center';ctx.font='bold 18px monospace';ctx.fillText('脱出ヘリ',hx,hy-55);
    const ok=rescued>=GOALS[stage-1];
    ctx.fillStyle=ok?'#00ff00':'#ff4444';ctx.font='14px monospace';
    ctx.fillText(ok?'搭乗可！':`救助 ${rescued}/${GOALS[stage-1]}`,hx,hy-36);
}

function drawUI() {
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,78);
    ctx.fillStyle='#00ff00';ctx.font='bold 17px monospace';ctx.textAlign='left';
    ctx.fillText(`STAGE ${stage}`,12,26);
    ctx.fillText(`残距離 ${Math.max(0,Math.floor((heliP-scroll)/10))}m`,12,50);
    ctx.fillText(`救助 ${rescued}/${GOALS[stage-1]}`,12,74);
    ctx.textAlign='right';ctx.fillText(`${score}pt`,W-12,26);
    ctx.fillStyle='#aaffaa';ctx.font='14px monospace';ctx.fillText(`最高 ${best}`,W-12,50);
    if(P.boots){ctx.fillStyle='#ffff00';ctx.fillText('２段ジャンプ',W-12,72);}

    if(gmsg){
        ctx.textAlign='center';ctx.font='bold 20px monospace';
        const gw=ctx.measureText(gmsg).width+20;
        ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(W/2-gw/2,84,gw,28);
        ctx.fillStyle='#ffff44';ctx.fillText(gmsg,W/2,104);
    }
    if(rtxt){
        ctx.globalAlpha=rtxt.t/30;ctx.textAlign='center';
        ctx.fillStyle=rtxt.mul>1?'#ffff00':'#00ff88';
        ctx.font=`bold ${14+rtxt.mul*2}px monospace`;
        ctx.fillText(`救助！+${100*rtxt.mul}`,rtxt.x,rtxt.y-20+90);ctx.globalAlpha=1;
    }
    if(ctxt&&ctxt.n>1){
        ctx.globalAlpha=ctxt.t/45;ctx.fillStyle='#ffff00';ctx.font='bold 26px monospace';ctx.textAlign='center';
        ctx.fillText(`COMBO x${ctxt.n}!!`,W/2,140);ctx.globalAlpha=1;
    }
}

function drawOver() {
    if(!['start','gameover','stageclear'].includes(gs)) return;
    ctx.fillStyle='rgba(0,0,0,.93)';ctx.fillRect(0,0,W,H);
    const cx=W/2;ctx.textAlign='center';
    if(gs==='start') {
        ctx.fillStyle='#ff4400';ctx.font='bold 34px monospace';ctx.fillText('戦場の衛生兵',cx,H/2-160);
        ctx.fillStyle='#00ff00';ctx.font='26px monospace';ctx.fillText('Battlefield Medic',cx,H/2-112);
        ctx.fillStyle='#fff';ctx.font='19px monospace';ctx.fillText('命を救え。敵は倒すな。',cx,H/2-50);
        ctx.fillStyle='#aaa';ctx.font='15px monospace';
        ctx.fillText('タップ／スペース：ジャンプ',cx,H/2);ctx.fillText('負傷兵に触れて救助 → ヘリで脱出',cx,H/2+30);
        ctx.fillStyle='#00ff00';ctx.font='bold 20px monospace';ctx.fillText('[ タップしてスタート ]',cx,H/2+130);
        if(best>0){ctx.fillStyle='#ffff00';ctx.font='15px monospace';ctx.fillText(`ハイスコア: ${best}pt`,cx,H/2+190);ctx.fillText(`総救助数: ${totR}人`,cx,H/2+215);}
    } else if(gs==='gameover') {
        ctx.fillStyle='#ff4444';ctx.font='bold 38px monospace';ctx.fillText('GAME OVER',cx,H/2-180);
        ctx.fillStyle='#00ff00';ctx.font='17px monospace';ctx.textAlign='left';
        const lx=cx-110;
        ctx.fillText(`救助: ${rescued}人`,lx,H/2-30);ctx.fillText(`被弾: ${dmg}回`,lx,H/2+10);
        ctx.fillText(`スコア: ${score}pt`,lx,H/2+50);ctx.fillText(`最高: ${best}pt`,lx,H/2+90);
        ctx.textAlign='center';ctx.fillStyle='#00ff00';ctx.font='bold 19px monospace';
        ctx.fillText('[ タップでリスタート ]',cx,H/2+180);
    } else {
        ctx.fillStyle='#00ff00';ctx.font='bold 34px monospace';ctx.fillText('ステージクリア！',cx,H/2-180);
        ctx.fillStyle='#ffff00';ctx.font='bold 18px monospace';ctx.fillText(`第${stage}ステージ 完了`,cx,H/2-125);
        ctx.fillStyle='#00ff00';ctx.font='17px monospace';ctx.textAlign='left';
        const lx=cx-110;
        ctx.fillText(`救助: ${rescued}人`,lx,H/2-40);ctx.fillText(`被弾: ${dmg}回`,lx,H/2);
        ctx.fillText(`スコア: ${score}pt`,lx,H/2+40);ctx.fillText(`最高: ${best}pt`,lx,H/2+80);
        ctx.textAlign='center';ctx.fillStyle='#00ff00';ctx.font='bold 19px monospace';
        ctx.fillText(stage<3?'[ 次のステージへ ]':'[ ミッション完了！ ]',cx,H/2+180);
    }
}

// ── DRAW ──────────────────────────────────────
function draw() {
    const sx=(Math.random()-.5)*shake, sy=(Math.random()-.5)*shake;
    ctx.save();ctx.translate(sx,sy);

    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    drawBg();

    // ブーツ
    items.forEach(it=>{
        const dx=it.sx-scroll;
        if(dx<-50||dx>W+50) return;
        ctx.fillStyle='#ffdd00';ctx.fillRect(dx+3,it.sy+5,20,13);
        ctx.fillStyle='#ff8800';ctx.fillRect(dx,it.sy+16,26,7);
        if(Math.floor(t/6)%2===0){ctx.fillStyle='#fff';ctx.fillRect(dx+11,it.sy-4,4,4);}
    });

    drawObs();
    inj.forEach(s=>{const dx=s.sx-scroll;if(!s.res&&dx>-80&&dx<W+80) drawInjured(dx,s.sy);});
    parts.forEach(p=>{ctx.globalAlpha=p.l/p.ml;ctx.fillStyle=p.c;ctx.fillRect(p.x-2,p.y-2,5,5);});
    ctx.globalAlpha=1;

    drawHeli();
    if(P.inv%8<4||P.inv===0) drawMedic(P.x,P.y);

    ctx.restore();

    if(flash>0){ctx.globalAlpha=(flash/18)*.6;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flash--;}

    drawUI();
    drawOver();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
