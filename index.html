<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>戦場の衛生兵</title>
    <style>
        * { margin:0; padding:0; }
        html,body { width:100%; height:100%; background:#000; overflow:hidden; }
        body { display:flex; justify-content:center; align-items:center; }
        canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; touch-action:none; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

// 小解像度キャンバス → CSS拡大でドット絵風に
const W=180, H=320;
cv.width=W; cv.height=H;

function resize(){
    const s=Math.min(innerWidth/W, innerHeight/H);
    cv.style.width=Math.floor(W*s)+'px';
    cv.style.height=Math.floor(H*s)+'px';
}
addEventListener('resize',resize); resize();

const GY=H-45;   // 地面Y(275)
const PX=38;     // プレイヤー固定X（左寄りで前方視野を確保）

const P={x:PX, y:GY-22, w:12, h:22, vy:0, onG:true, dj:false,
         hp:5, mhp:5, boots:false, vest:false, grenade:false,
         tourn:0, morph:0, inv:0, fr:0};
const JMP=9, GR=0.38;
const BTN_X=W-24, BTN_Y=H-26, BTN_R=22; // アクションボタン（モバイル向け大型化）
const WARN_FRAMES=65; // 障害物スポーン警告フレーム数

let gs='start', stage=1, scroll=0, spd=1.2, t=0;
let score=0, rescued=0;
let totR=parseInt(localStorage.getItem('bf_total'))||0;
let best=parseInt(localStorage.getItem('bf_high'))||0;
let obs=[], inj=[], items=[], parts=[], smokes=[];
let pending=[], mortars=[]; // 警告キュー・モルタル
let shake=0, flash=0, rtxt=null, combo=0, ctmr=0, ctxt=null;
let heliP=7300, heliR=false, dmg=0, gmsg='', safeZ=0;
let smokeAura=0, smokeCloud=[]; // プレイヤー追従型煙幕
const SMOKE_DUR=300; // 5秒
let rushTimer=0, btnFlash=0, adrenPop=0; // 無敵ラン・ボタン点灯・ポップアップ
let wingTimer=0, jetting=false; // 飛行アイテム残り時間・推力状態
const WING_DUR=300; // 5秒（60fps）
let flyParts=[]; // グレネード補給演出（飛行パーティクル）
const RUSH_DUR=240, GOALS=[2,3,5];
let airThreats=[], airBullets=[], airBombs=[], detected=0; // 航空脅威システム
let enemies=[], enemyBullets=[]; // 地上敵兵士

function snd(f,d){
    const af=(P.hp===1||rushTimer>0)?f*1.25:f; // 瀕死/ラッシュ時ピッチ+25%
    try{const ac=new(AudioContext||webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=af;g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d);}catch(e){}
}
function px(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}
function txo(s,x,y,c,sz,al){ctx.font=`bold ${sz}px monospace`;ctx.textAlign=al||'center';ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillText(s,x+1,y+1);ctx.fillStyle=c;ctx.fillText(s,x,y);}
function spark(x,y,c,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3-1,c,l:20,ml:20});}

function activateSmoke(){
    if(gs!=='playing'||!P.grenade)return;
    P.grenade=false;
    smokeAura=SMOKE_DUR;
    // 初期爆発パーティクル
    for(let i=0;i<12;i++){
        smokeCloud.push({
            sx: P.x+scroll+P.w/2+(Math.random()-.5)*20,
            sy: P.y+P.h/2+(Math.random()-.5)*18,
            r: 7+Math.random()*6,
            life:0, maxLife:60+Math.random()*30,
            dvx:(Math.random()-.3)*.6, dvy:(Math.random()-.5)*.4
        });
    }
    snd(300,.4);
}
function inSmoke(){return smokeAura>0;}

function hitBtn(cx,cy){
    return Math.hypot(cx-BTN_X,cy-BTN_Y)<BTN_R;
}

function canvasCoords(clientX,clientY){
    const r=cv.getBoundingClientRect();
    return [(clientX-r.left)*(W/r.width),(clientY-r.top)*(H/r.height)];
}

function inp(cx,cy){
    if(cx!==undefined&&hitBtn(cx,cy)){activateSmoke();return;}
    if(gs==='start'){stage=1;rst();return;}
    if(gs==='stageclear'){if(stage<3){stage++;rst();}else{save();location.reload();}return;}
    if(gs==='gameover'){location.reload();return;}
    if(gs==='playing'){
        if(P.onG){P.vy=-JMP;P.onG=false;P.dj=false;snd(380,.1);}
        else if(P.boots&&!P.dj){P.vy=-JMP*.85;P.dj=true;snd(520,.1);}
    }
}
let jetTouchId=null; // ジェットパック担当の指を追跡
cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
        const[cx,cy]=canvasCoords(t.clientX,t.clientY);
        if(hitBtn(cx,cy)){activateSmoke();continue;} // 煙ボタン（どの指でも可）
        if(wingTimer>0&&gs==='playing'){jetting=true;jetTouchId=t.identifier;continue;}
        inp(cx,cy); // ジャンプ
    }
},{passive:false});
document.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
        if(t.identifier===jetTouchId){jetting=false;jetTouchId=null;}
    }
},{passive:true});
document.addEventListener('touchcancel',()=>{jetting=false;jetTouchId=null;},{passive:true});
document.addEventListener('keydown',e=>{
    if(e.code==='Space'){
        e.preventDefault();
        if(wingTimer>0&&gs==='playing'){jetting=true;return;}
        inp();
    }
    if(e.code==='KeyF')activateSmoke();
});
document.addEventListener('keyup',e=>{
    if(e.code==='Space')jetting=false;
});

function rst(){
    gs='playing'; scroll=0; t=0; score=0; rescued=0;
    obs=[]; inj=[]; items=[]; parts=[]; smokes=[];
    P.hp=5; P.boots=false; P.vest=false; P.grenade=false;
    P.tourn=0; P.morph=0;
    P.y=GY-P.h; P.vy=0; P.onG=true; P.inv=0; P.fr=0;
    combo=0; ctmr=0; heliP=7300; heliR=false; shake=0; flash=0; dmg=0; gmsg='';
    safeZ=heliP-900; smokeAura=0; smokeCloud=[]; pending=[]; mortars=[];
    rushTimer=0; btnFlash=0; adrenPop=0; flyParts=[]; wingTimer=0; jetting=false;
    airThreats=[]; airBullets=[]; airBombs=[]; detected=0;
    enemies=[]; enemyBullets=[];
}
function save(){totR+=rescued;if(score>best)best=score;localStorage.setItem('bf_total',totR);localStorage.setItem('bf_high',best);}

// ===== UPDATE =====
function update(){
    if(gs!=='playing')return;
    // 速度：ステージ別ベース＋距離に応じて後半30%増し
    spd=(1.35+(stage-1)*.28)*(1+Math.min(.3,scroll/heliP*.4));
    t++; P.fr++; scroll+=spd;
    if(wingTimer>0){
        wingTimer--;
        P.vy+=GR*0.5; // ジェット中は重力半減（ゆっくり落下）
        if(jetting){P.vy=Math.max(P.vy-1.8,-6.5);if(t%3===0)snd(440,.04);} // 押してる間だけ推力
        if(wingTimer===0)jetting=false;
    }else{
        jetting=false;
        P.vy+=GR;
    }
    P.vy=Math.min(P.vy,11);
    P.y+=P.vy;
    if(P.y<22){P.y=22;P.vy=Math.max(0,P.vy);} // 天井（HUD裏に入らない）
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}else P.onG=false;
    P.inv=Math.max(0,P.inv-1);

    const gx=scroll+W, dist=heliP-scroll, safe=scroll>=safeZ;
    if(dist<1200&&dist>900)gmsg='接近中';
    else if(dist<900&&dist>500)gmsg='ヘリ視認！';
    else if(dist<500&&dist>0)gmsg='全力で！';
    else gmsg='';

    if(!safe){
        const df=1+(scroll/heliP)*.8;
        if(t%Math.max(28,Math.floor(70/df))===0){
            const r=Math.random();
            // obs.pushの代わりにpendingキューへ（WARN_FRAMES後にスポーン）
            if(r<.6)                pending.push({sy:GY-13,w:13,h:13,type:'exp', delay:WARN_FRAMES});
            else if(r<.8&&stage>=2) pending.push({sy:GY-11,w:W*.5,h:7,type:'mg',  delay:WARN_FRAMES});
            else if(stage>=3)       pending.push({sy:GY-9, w:11,h:9, type:'wire',delay:WARN_FRAMES});
        }
        // モルタル砲（480fごと、着弾予測地点はプレイヤー前方）
        if(t%480===0&&Math.random()<.45){
            const tx=scroll+PX+120+(Math.random()-.5)*60; // プレイヤー前方ワールド座標
            mortars.push({sx:tx,state:'warn',life:0,maxLife:100,r:18});
        }
        const df2=1+(scroll/heliP)*.8;
        const ii=Math.max(50,Math.floor((160-stage*15)/df2));
        if(t%ii===0){
            const ir=Math.random();
            const injType=ir<.68?'normal':ir<.84?'bleed':'shock';
            inj.push({sx:gx,sy:GY-10,w:12,h:10,res:false,type:injType});
        }
        if(t%200===0&&Math.random()<.6)  items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'boots'});
        if(t%240===0&&Math.random()<.55) items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'vest'});
        if(t%260===0&&Math.random()<.5)  items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'grenade'});
        if(t%220===0&&Math.random()<.5&&P.hp<P.mhp) items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'heart'});
        if(t%230===0&&Math.random()<.55) items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'tourn'});
        if(t%280===0&&Math.random()<.48) items.push({sx:gx,sy:GY-11,w:8,h:7,got:false,type:'morph'});
        if(t%500===0&&Math.random()<.3)  items.push({sx:gx,sy:GY-18,w:8,h:7,got:false,type:'jetpack'});

        // 地上敵兵士（全ステージ・難易度に応じて頻度上昇）
        const ef=1+(scroll/heliP)*.6;
        if(t%Math.max(160,Math.floor(290/ef))===0&&Math.random()<.55){
            if(Math.random()<.55)
                enemies.push({type:'rush',sx:gx,sy:GY-14,w:10,h:14,hit:false,fr:0,vx:1.2+Math.random()*.6});
            else
                enemies.push({type:'gun',sx:gx,sy:GY-14,w:10,h:14,hit:false,fr:0,shotCd:40,shotFlash:0});
        }
    }

    // pendingキュー処理：カウントダウン→obsへ移動
    pending.forEach(p=>{
        p.delay--;
        if(p.delay<=0){obs.push({sx:scroll+W,sy:p.sy,w:p.w,h:p.h,t:p.type});p.done=true;}
    });
    pending=pending.filter(p=>!p.done);

    // モルタル更新
    mortars.forEach(m=>{
        m.life++;
        if(m.state==='warn'&&m.life>=m.maxLife){
            m.state='boom'; m.life=0; m.maxLife=22;
            spark(m.sx-scroll,GY-6,'#ff8800',18); snd(75,.35);
            // 爆発ダメージ（1フレーム目のみ、P.inv/inSmoke/rush考慮）
            if(P.inv<=0&&!inSmoke()&&rushTimer<=0){
                const edx=(P.x+P.w/2)-(m.sx-scroll);
                if(Math.abs(edx)<22&&P.y+P.h>GY-14){
                    if(P.vest){P.vest=false;P.inv=20;shake=3;spark(m.sx-scroll,GY-8,'#4488ff',12);snd(200,.2);}
                    else{P.hp--;P.boots=false;P.inv=30;P.vy=-5;dmg++;shake=5;flash=15;snd(90,.25);}
                }
            }
        }
    });
    mortars=mortars.filter(m=>!(m.state==='boom'&&m.life>=m.maxLife)&&m.sx-scroll>-80);

    // 煙幕エフェクト更新（プレイヤー追従型）
    if(smokeAura>0){
        smokeAura--;
        if(t%4===0){
            for(let i=0;i<2;i++){
                smokeCloud.push({
                    sx: P.x+scroll+P.w/2+(Math.random()-.25)*22,
                    sy: P.y+P.h/2+(Math.random()-.5)*16,
                    r: 6+Math.random()*6,
                    life:0, maxLife:55+Math.random()*25,
                    dvx:(Math.random()-.2)*.5, dvy:(Math.random()-.5)*.3
                });
            }
        }
    }
    smokeCloud.forEach(p=>{p.life++;p.sx+=p.dvx;p.sy+=p.dvy;});
    smokeCloud=smokeCloud.filter(p=>p.life<p.maxLife);

    // 当たり判定（ヒットフラグ方式で安全に処理）
    const hidden=inSmoke()||rushTimer>0; // 煙幕中/無敵ラン中は全攻撃を無効化
    obs.forEach(o=>{
        if(o.hit||P.inv>0)return;
        if(hidden){o.hit=true;return;}
        const dx=o.sx-scroll;
        if(P.x<dx+o.w&&P.x+P.w>dx&&P.y<o.sy+o.h&&P.y+P.h>o.sy){
            o.hit=true;
            if(P.vest){
                // ベストが1回だけダメージを肩代わり
                P.vest=false; P.inv=20; shake=3;
                spark(dx+o.w/2,o.sy+o.h/2,'#4488ff',14); snd(200,.2);
            }else{
                P.hp--; P.boots=false; P.inv=30; P.vy=-6; dmg++;
                shake=5; flash=15; spark(dx+o.w/2,o.sy+o.h/2,'#ff8800',12); snd(90,.25);
            }
        }
    });
    items.forEach(it=>{
        if(it.got)return;
        const dx=it.sx-scroll;
        if(P.x<dx+it.w&&P.x+P.w>dx&&P.y<it.sy+it.h&&P.y+P.h>it.sy){
            it.got=true;
            if(it.type==='boots'){P.boots=true; spark(dx+it.w/2,it.sy,'#ffff00',8); snd(660,.12);}
            else if(it.type==='vest'){P.vest=true; spark(dx+it.w/2,it.sy,'#4488ff',10); snd(550,.15);}
            else if(it.type==='grenade'){P.grenade=true; spark(dx+it.w/2,it.sy,'#aaffaa',10); snd(440,.15);}
            else if(it.type==='heart'){P.hp=Math.min(P.mhp,P.hp+1); spark(dx+it.w/2,it.sy,'#ff4488',12); snd(740,.2);}
            else if(it.type==='tourn'){P.tourn++; spark(dx+it.w/2,it.sy,'#ff4444',10); snd(600,.12);}
            else if(it.type==='morph'){P.morph++; spark(dx+it.w/2,it.sy,'#cc44ff',10); snd(500,.12);}
            else if(it.type==='jetpack'){wingTimer=WING_DUR; spark(dx+it.w/2,it.sy,'#ff8800',16); snd(880,.4);}
        }
    });
    inj.forEach(s=>{
        if(s.res)return;
        const dx=s.sx-scroll;
        if(!(P.x<dx+s.w&&P.x+P.w>dx&&P.y<s.sy+s.h&&P.y+P.h>s.sy))return;
        // トリアージ：アイテム不足なら救助不可
        const stype=s.type||'normal';
        if(stype==='bleed'&&P.tourn<=0)return;
        if(stype==='shock'&&P.morph<=0)return;

        s.res=true; rescued++; combo++; ctmr=120;
        const mul=Math.min(5,Math.floor(combo/2)+1);
        const adren=P.hp===1?2:1;
        score+=100*mul*adren; shake=3;
        rtxt={x:dx+s.w/2,y:s.sy,t:25,mul};
        if(combo>1)ctxt={x:W/2,y:30,t:40,n:combo};
        spark(dx+s.w/2,s.sy+s.h/2,'#00ff88',10); snd(780,.3);

        if(stype==='bleed'){
            P.tourn--;
            // グレネード自動補給 + 飛行演出
            P.grenade=true;
            for(let i=0;i<6;i++){
                flyParts.push({x:dx+s.w/2+((Math.random()-.5)*6),
                               y:s.sy+((Math.random()-.5)*6),
                               life:0, maxLife:30+i*4});
            }
            btnFlash=35; snd(660,.2);
        }else if(stype==='shock'){
            P.morph--;
            // 無敵ラン発動
            rushTimer=RUSH_DUR; adrenPop=90; snd(880,.5);
        }
    });

    // 無敵ラン更新
    if(rushTimer>0){
        rushTimer--;
        scroll+=spd*.5; // 速度1.5倍（通常scroll+spd + 追加0.5spd）
        if(t%3===0)spark(P.x+P.w/2+(Math.random()-.5)*10,P.y+P.h*.5,'#ffff00',2);
    }
    if(btnFlash>0)btnFlash--;
    if(adrenPop>0)adrenPop--;
    // 飛行パーティクル更新（rescue点→BTN_X,BTN_Y）
    flyParts=flyParts.filter(fp=>{
        fp.x+=(BTN_X-fp.x)*.2;
        fp.y+=(BTN_Y-fp.y)*.2;
        return ++fp.life<fp.maxLife;
    });

    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l--;return p.l>0;});
    if(rtxt&&--rtxt.t<=0)rtxt=null;
    if(--ctmr<=0)combo=0;
    if(ctxt&&--ctxt.t<=0)ctxt=null;
    shake*=.8;

    if(t%45===0&&Math.random()<.4)
        smokes.push({x:W,y:20+Math.random()*(GY*.4),l:80,r:10+Math.random()*14});
    smokes=smokes.filter(s=>{s.x-=spd*.6;s.l--;s.r+=.15;return s.l>0&&s.x>-30;});

    // ===== 航空脅威スポーン =====
    if(!safe){
        // 攻撃ヘリ（St1:少量680F/St2+:480F・同時1機まで）
        const heliInt=stage===1?680:480, heliCh=stage===1?.28:.52;
        if(t%heliInt===0&&Math.random()<heliCh&&!airThreats.some(a=>a.type==='heli')){
            // 常に右から接近（プレイヤー右側で斜め攻撃→ジャンプ回避可能）
            airThreats.push({type:'heli',x:W+68,y:28+Math.random()*18,
                dir:-1,sp:0.9,phase:'fly',ptimer:0,sxOff:0,gunFlash:0});
        }
        // 爆撃機（ステージ3+・700Fごと・同時1機まで）
        if(stage>=3&&t%700===0&&Math.random()<.48&&!airThreats.some(a=>a.type==='bomber')){
            const dir=Math.random()<.5?-1:1;
            airThreats.push({type:'bomber',x:dir<0?W+92:-92,y:12+Math.random()*14,
                dir,sp:2.5,phase:'fly',ptimer:0,dropped:0});
        }
    }

    // ===== 航空脅威更新 =====
    airThreats.forEach(a=>{
        a.x+=a.dir*a.sp; a.ptimer++;
        if(a.type==='heli'){
            if(a.gunFlash>0)a.gunFlash--;
            if(a.phase==='fly'){
                // プレイヤー右60px付近で停止（斜め攻撃ポジション）
                if(a.x<=PX+62){
                    a.phase='search'; a.ptimer=0; a.sp*=.15;
                }
            }else if(a.phase==='search'){
                a.sxOff=Math.sin(a.ptimer*.09)*44; // 照射スイープ
                if(a.ptimer>90){a.phase='warn';a.ptimer=0;snd(200,.35);}
            }else if(a.phase==='warn'){
                // サーチライトをプレイヤー方向へ収束
                const tgt=(PX+P.w/2)-a.x;
                a.sxOff+=(tgt-a.sxOff)*.07;
                if(!inSmoke()&&Math.abs((PX+P.w/2)-(a.x+a.sxOff))<22)detected=25;
                if(a.ptimer>60){a.phase='gun';a.ptimer=0;} // 1秒の回避猶予
            }else if(a.phase==='gun'){
                if(!inSmoke()&&Math.abs((PX+P.w/2)-(a.x+a.sxOff))<22)detected=25;
                // 3バースト・18F間隔・1発ずつ・速度5（ジャンプで回避可能）
                if((a.ptimer===1||a.ptimer===19||a.ptimer===37)&&!inSmoke()){
                    a.gunFlash=8;
                    const mx=a.x+14, my=a.y+9; // 機首マズル
                    const tx=PX+P.w/2, ty=GY-6; // 足元狙い（上半身はジャンプで回避可）
                    const d_=Math.hypot(tx-mx,ty-my);
                    airBullets.push({x:mx,y:my,
                        vx:(tx-mx)/d_*5, vy:(ty-my)/d_*5,
                        life:Math.ceil(d_/5)+14});
                    snd(380,.05);
                }
                if(a.ptimer>55){a.phase='leave';a.ptimer=0;a.sp=1.3;}
            }else if(a.phase==='leave'){
                a.sp=Math.min(2.8,a.sp+.07);
            }
        }else{
            // 爆撃機: 飛行中に爆弾投下（画面内かつ未超過）
            if(a.x>30&&a.x<W-30&&a.ptimer%80===0&&a.dropped<3){
                airBombs.push({sx:a.x+scroll,y:a.y+8,vy:0.5,phase:'fall',life:0,maxLife:28});
                a.dropped++; snd(180,.08);
            }
        }
    });
    airThreats=airThreats.filter(a=>a.x>-130&&a.x<W+130);

    // ===== 機銃弾更新 =====
    airBullets.forEach(b=>{
        b.x+=b.vx; b.y+=b.vy; b.life--;
        if(b.y>=GY){spark(b.x,GY-2,'#cc9940',3);b.life=0;return;}
        if(P.inv<=0&&!inSmoke()&&rushTimer<=0){
            if(Math.abs(b.x-(P.x+P.w/2))<7&&b.y>=P.y&&b.y<=P.y+P.h){
                b.life=0;
                if(P.vest){P.vest=false;P.inv=22;shake=3;spark(b.x,b.y,'#4488ff',8);snd(200,.18);}
                else{P.hp--;P.inv=30;P.vy=-4;dmg++;shake=4;flash=12;spark(b.x,b.y,'#ff6600',8);snd(90,.22);}
            }
        }
    });
    airBullets=airBullets.filter(b=>b.life>0);

    // ===== 爆弾更新 =====
    airBombs.forEach(b=>{
        if(b.phase==='fall'){
            b.vy=Math.min(b.vy+.38,14); b.y+=b.vy;
            if(b.y>=GY-4){
                b.phase='explode'; b.life=0;
                const bsx=b.sx-scroll;
                spark(bsx,GY-6,'#ff8800',24); spark(bsx,GY-12,'#ffdd00',16);
                snd(85,.6); shake=Math.max(shake,7); flash=Math.max(flash,18);
                if(P.inv<=0&&!inSmoke()&&rushTimer<=0){
                    const edx=Math.abs((P.x+P.w/2)-bsx);
                    // 爆風半径28px・高さ22px（ジャンプで回避可能）
                    if(edx<28&&P.y+P.h>=GY-22){
                        if(P.vest){P.vest=false;P.inv=24;shake=Math.max(shake,5);spark(P.x+P.w/2,P.y,'#4488ff',14);snd(200,.2);}
                        else{P.hp--;P.boots=false;P.inv=36;P.vy=-7;dmg++;shake=Math.max(shake,9);flash=Math.max(flash,22);snd(90,.4);}
                    }
                }
            }
        }else b.life++;
    });
    airBombs=airBombs.filter(b=>!(b.phase==='explode'&&b.life>=b.maxLife));
    if(detected>0)detected--;

    // ===== 地上敵更新 =====
    enemies.forEach(en=>{
        en.fr++;
        const dx=en.sx-scroll;
        if(en.type==='rush'){
            if(!inSmoke())en.sx-=en.vx; // 煙幕中は突進停止（見えない）
            if(!en.hit&&P.inv<=0&&!inSmoke()&&rushTimer<=0){
                if(P.x<dx+en.w&&P.x+P.w>dx&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                    en.hit=true;
                    if(P.vest){P.vest=false;P.inv=20;shake=3;spark(dx+5,en.sy+7,'#4488ff',10);snd(200,.2);}
                    else{P.hp--;P.boots=false;P.inv=30;P.vy=-5;dmg++;shake=4;flash=12;spark(dx+5,en.sy+7,'#ff6600',12);snd(90,.22);}
                }
            }
        }else{
            // 狙撃兵: 画面内で射撃（定期的に銃を撃つ）
            if(dx>10&&dx<W-10){
                if(en.shotFlash>0)en.shotFlash--;
                en.shotCd--;
                if(en.shotCd<=0){
                    en.shotCd=60+Math.floor(Math.random()*40);
                    en.shotFlash=6;
                    enemyBullets.push({sx:en.sx-4,sy:en.sy+5,life:80});
                    snd(320,.05);
                }
            }
        }
    });
    enemies=enemies.filter(en=>!en.hit&&(en.sx-scroll)>-30);
    // 敵弾更新（世界座標・左方向）
    enemyBullets.forEach(b=>{
        b.sx-=3.5; b.life--;
        const bx=b.sx-scroll;
        if(P.inv<=0&&!inSmoke()&&rushTimer<=0){
            if(bx>=P.x&&bx<=P.x+P.w&&b.sy>=P.y&&b.sy<=P.y+P.h){
                b.life=0;
                if(P.vest){P.vest=false;P.inv=22;shake=3;spark(bx,b.sy,'#4488ff',8);snd(200,.18);}
                else{P.hp--;P.inv=30;P.vy=-3;dmg++;shake=4;flash=12;spark(bx,b.sy,'#ff6600',8);snd(90,.22);}
            }
        }
    });
    enemyBullets=enemyBullets.filter(b=>b.life>0&&b.sx-scroll>-20);

    if(P.hp<=0){save();gs='gameover';}
    if(heliP-scroll<=PX+P.w&&!heliR){
        heliR=true;
        if(rescued>=GOALS[stage-1]){gs='stageclear';flash=20;spark(PX,GY-60,'#00ff00',20);snd(880,.4);}
        else{save();gs='gameover';}
    }
    obs=obs.filter(o=>!o.hit&&o.sx>scroll-30);
    inj=inj.filter(s=>s.sx>scroll-30);
    items=items.filter(it=>!it.got&&it.sx>scroll-30);
}

// ===== 背景 =====
function drawBg(){
    // 空グラデーション
    const sg=ctx.createLinearGradient(0,0,0,GY);
    if(stage===1){sg.addColorStop(0,'#0a0a1e');sg.addColorStop(.7,'#1a1a35');sg.addColorStop(1,'#2a1808');}
    else if(stage===2){sg.addColorStop(0,'#080810');sg.addColorStop(.6,'#0e0e1e');sg.addColorStop(1,'#1e0e0e');}
    else{sg.addColorStop(0,'#050508');sg.addColorStop(.4,'#0e0505');sg.addColorStop(1,'#220a03');}
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);

    // 地平線グロー
    const hg=ctx.createLinearGradient(0,GY-30,0,GY);
    hg.addColorStop(0,'rgba(0,0,0,0)');
    hg.addColorStop(1,stage===3?'rgba(160,30,0,.4)':'rgba(80,30,0,.2)');
    ctx.fillStyle=hg; ctx.fillRect(0,GY-30,W,30);

    // 遠景山シルエット（0.15xパラックス、W幅タイル）
    ctx.fillStyle=stage===1?'#151c3a':stage===2?'#101018':'#180a08';
    const moff=scroll*.15%W;
    for(let i=-1;i<3;i++){
        const mx=i*W-moff;
        ctx.beginPath();
        ctx.moveTo(mx,GY-18);
        ctx.lineTo(mx+W*.10,GY-55); ctx.lineTo(mx+W*.22,GY-30);
        ctx.lineTo(mx+W*.38,GY-68); ctx.lineTo(mx+W*.55,GY-38);
        ctx.lineTo(mx+W*.70,GY-58); ctx.lineTo(mx+W*.85,GY-28);
        ctx.lineTo(mx+W,GY-20);
        ctx.lineTo(mx+W,GY); ctx.lineTo(mx,GY);
        ctx.closePath(); ctx.fill();
    }

    // 中景廃墟（0.4xパラックス、60px幅タイル）
    const btw=60, boff=scroll*.4%btw;
    ctx.fillStyle=stage===1?'#182030':stage===2?'#141018':'#1a1008';
    for(let i=-1;i<W/btw+2;i++){
        const bx=i*btw-boff, bh=18+(i*17+50)%18;
        px(bx,GY-bh,18,bh); px(bx+3,GY-bh-7,8,7); px(bx+14,GY-bh-10,6,10);
        ctx.fillStyle='rgba(0,0,0,.55)';
        px(bx+2,GY-bh+4,3,3); px(bx+8,GY-bh+4,3,3);
        px(bx+2,GY-bh+10,3,3); px(bx+8,GY-bh+10,3,3);
        ctx.fillStyle=stage===1?'#182030':stage===2?'#141018':'#1a1008';
    }

    // 煙
    ctx.globalAlpha=.25; ctx.fillStyle='#777';
    smokes.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;

    // 地面（画面最下部）
    const gc=stage===1?'#b89450':stage===2?'#3a2c18':'#585858';
    const gc2=stage===1?'#8a6830':stage===2?'#241a0c':'#3c3c3c';
    ctx.fillStyle=gc; ctx.fillRect(0,GY,W,10);
    ctx.fillStyle=gc2; ctx.fillRect(0,GY+10,W,H-GY-10);
    // 地面ライン
    ctx.fillStyle=stage===1?'#caa85a':stage===2?'#4a3820':'#686868';
    ctx.fillRect(0,GY,W,2);

    // 地面クレーター（1xスクロール、40px幅タイル）
    ctx.fillStyle=stage===1?'#8a6030':stage===2?'#1e140a':'#404040';
    const coff=scroll%40;
    for(let i=-1;i<W/40+2;i++){
        ctx.beginPath(); ctx.ellipse(i*40-coff,GY+8,8,3,0,0,Math.PI*2); ctx.fill();
    }

    // 地面小道具（0.95xスクロール）
    if(stage===1){
        ctx.fillStyle='#7a6040';
        const off=scroll*.95%70;
        for(let i=-1;i<W/70+2;i++){const sx=i*70-off;px(sx,GY-8,12,8);px(sx+2,GY-12,9,5);}
    }else if(stage===2){
        ctx.fillStyle='#4a2c10';
        const off=scroll*.95%80;
        for(let i=-1;i<W/80+2;i++){const sx=i*80-off;px(sx,GY-14,2,14);px(sx-4,GY-10,10,2);}
    }else{
        ctx.fillStyle='#3a3a3a';
        const off=scroll*.95%55;
        for(let i=-1;i<W/55+2;i++){const sx=i*55-off;px(sx,GY-6,8,6);px(sx+2,GY-9,4,4);}
    }
}

// ===== スプライト（シンプル図形） =====
function drawMedic(x,y){
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*0.3):0;
    const loff=Math.round(wa*3); // 脚の振れのみ（腕は静止）

    // === ジェットパック（飛行中・背中中央） ===
    if(wingTimer>0){
        ctx.fillStyle='#445544'; px(cx-3,y+11,6,9);
        ctx.fillStyle='#223322'; px(cx-2,y+12,4,6);
        ctx.fillStyle='#667766'; px(cx-3,y+18,2,2); px(cx+1,y+18,2,2);
        const fl=Math.floor(t/(jetting?2:5))%2;
        const fh=jetting?6:2;
        ctx.fillStyle=fl?'#ff5500':'#ffcc00';
        px(cx-3,y+20,2,fh); px(cx+1,y+20,2,fh);
        if(jetting&&fl){ctx.fillStyle='rgba(255,34,0,.4)';px(cx-4,y+24,8,3);}
        if(t%(jetting?2:4)===0)spark(cx,y+(jetting?27:24),jetting?'#ff3300':'#ff8800',jetting?3:1);
    }

    // === 医療バックパック（背中側・左側面に3px見える） ===
    if(wingTimer<=0){
        ctx.fillStyle='#7a5218'; px(x+0,y+11,4,9); // バッグ左面
        ctx.fillStyle='#5a3c10'; px(x+1,y+12,2,7); // バッグ影
        ctx.fillStyle='#cc3333'; px(x+1,y+14,1,3); // バッグ赤十字：縦
        ctx.fillStyle='#cc3333'; px(x+0,y+15,3,1); // バッグ赤十字：横
        ctx.fillStyle='#998866'; px(x+3,y+11,1,1); // バッグ上端
        // 肩ひも（左肩から右腰へ斜めに）
        ctx.fillStyle='#886030';
        px(cx-3,y+11,2,1);         // 左肩取り付け部
        px(cx-2,y+12,1,1);
        px(cx-1,y+13,2,1);         // 胸を横切るひも
        px(cx+1,y+14,1,1);
        px(cx+2,y+15,2,1);         // 右腰へ
    }

    // === 左腕（静止・自然な垂らし位置） ===
    ctx.fillStyle='#3a6820';
    px(x+1,y+12,3,5); // 上腕
    px(x+0,y+16,3,3); // 前腕（やや前）
    ctx.fillStyle='#c4906a'; px(x+0,y+18,3,2); // 左手

    // === 体（左側面影 + 正面胸部） ===
    ctx.fillStyle='#3a6018'; px(x+3,y+11,2,9);  // 左側面（影・奥行き）
    ctx.fillStyle='#5a8830'; px(x+5,y+11,6,9);  // 胸部正面

    // === 胸の赤十字（正面センター） ===
    ctx.fillStyle='#ee1111';
    px(cx-0,y+12,2,5); // 縦
    px(cx-2,y+14,5,2); // 横

    // === ベルト＋バックル ===
    ctx.fillStyle='#3a5a18'; px(x+3,y+18,8,2);
    ctx.fillStyle='#ccaa33'; px(cx-0,y+18,2,2);

    // === 右腕（静止・自然な垂らし位置） ===
    ctx.fillStyle='#4a7828';
    px(x+9,y+12,3,5);
    px(x+10,y+16,3,3);
    ctx.fillStyle='#d4aa66'; px(x+10,y+18,3,2); // 右手

    // === 顔（正面向き・8px幅・大きめ） ===
    ctx.fillStyle='#d4aa66'; px(cx-3,y+4,8,7); // 顔（8px幅）

    // === ヘルメット（10px幅・7px高・大きめ） ===
    ctx.fillStyle='#f2f2f2'; px(cx-4,y+0,10,7);
    ctx.fillStyle='#dd2020'; px(cx-4,y+6,10,1); // 赤ライン
    ctx.fillStyle='#ee1111'; px(cx-1,y+1,2,5); px(cx-2,y+3,4,2); // 赤十字

    // === 両目（正面向き・y+8） ===
    ctx.fillStyle='#111';
    px(cx-2,y+8,2,2); // 左目
    px(cx+2,y+8,2,2); // 右目
    ctx.fillStyle='#fff';
    px(cx-1,y+8,1,1); // 左ハイライト
    px(cx+3,y+8,1,1); // 右ハイライト
    ctx.fillStyle='#b8906a'; px(cx,y+10,2,1); // 鼻

    // === 脚（2本・3/4正面・走行アニメ） ===
    ctx.fillStyle='#1e1808'; // 左脚（背面・暗め）
    px(cx-4+loff,y+20,4,5);
    px(cx-4,y+24,4,3);
    ctx.fillStyle='#0d0d08'; px(cx-5,y+26,6,2); // 左靴
    ctx.fillStyle='#2a2010'; // 右脚（前面）
    px(cx-1-loff,y+20,4,5);
    px(cx-1,y+24,4,3);
    ctx.fillStyle='#111'; px(cx-1,y+26,6,2); // 右靴

    if(P.boots){ctx.fillStyle='#ffff00';px(x,y+P.h-2,P.w,2);}
}

function drawInjured(x,y,type){
    const stype=type||'normal';
    const blink=Math.floor(t/8)%2===0;
    const cx=x+6;

    // ===== 共通ヘルパー: 兵士用M1ヘルメット =====
    function soldierHelmet(hx,hy,tilt){
        // ブリム（少し広め）→M1ヘルメットらしさ
        ctx.fillStyle='#2a4018'; px(hx-4+tilt,hy+2,9,1);
        // ドーム本体
        ctx.fillStyle='#3a5020'; px(hx-3+tilt,hy-1,7,4);
        ctx.fillStyle='#2a3a18'; px(hx-3+tilt,hy-1,7,1); // 上端暗め
        ctx.fillStyle='#4a6028'; px(hx-2+tilt,hy+0,5,1); // ハイライト帯
    }

    // ===== 共通ヘルパー: ライフル =====
    function rifle(rx,ry,angle){
        // angle=0:水平  angle=1:斜め
        ctx.fillStyle='#1e1208';
        if(angle){
            // 斜め（diagonal）
            px(rx,   ry+2, 2,2); px(rx+2, ry+1,2,2);
            px(rx+4, ry,   2,2); px(rx+6, ry-1,2,2);
            px(rx+8, ry-2, 2,2);
            ctx.fillStyle='#333'; px(rx+9,ry-3,1,2); // マズル
        }else{
            // 水平
            px(rx,ry,10,2);
            ctx.fillStyle='#2e1e10'; px(rx+7,ry,3,3); // 銃床
            ctx.fillStyle='#333';    px(rx,ry,1,2);    // マズル
        }
    }

    if(stype==='bleed'){
        // ===== タイプB: SOS 手を振る（出血） =====
        const wa=Math.floor(t/7)%2;

        // ライフル（地面に落とした・斜め）
        rifle(cx-6,y+8,1);

        // 血だまり
        ctx.fillStyle='rgba(150,0,0,.55)'; px(cx-3,y+9,8,2);

        // 脚（直立・少し開き）
        ctx.fillStyle='#2a3818';
        px(cx-3,y+6,3,4); px(cx+1,y+6,3,4);
        ctx.fillStyle='#0d0d08';
        px(cx-4,y+9,4,2); px(cx+1,y+9,4,2);

        // 体（血で汚れた）
        ctx.fillStyle='#882010'; px(cx-2,y+3,5,4);
        ctx.fillStyle='#aa3020'; px(cx-1,y+3,3,2);

        // 左腕（垂れ）
        ctx.fillStyle='#882010'; px(cx-4,y+4,2,4);

        // 右腕（振り上げ・アニメ）
        ctx.fillStyle='#882010';
        px(cx+2,y+2-wa,2,4);
        px(cx+3,y-1-wa,2,3);
        ctx.fillStyle='#c4906a'; px(cx+3,y-2-wa,2,2); // 手

        // 頭
        ctx.fillStyle='#c8a060'; px(cx-2,y+0,5,4);
        ctx.fillStyle='#fff'; px(cx-1,y+1,1,2); px(cx+1,y+1,1,2); // 白目
        ctx.fillStyle='#111'; px(cx-1,y+2,1,1); px(cx+1,y+2,1,1); // 瞳

        // ヘルメット（傾き+1でずれた感）
        soldierHelmet(cx,y-2,1);

        if(blink) txo('HELP',cx,y-4,'#ff4444',5);

    }else{
        // ===== タイプA: 片膝立ち（normal / shock） =====
        const isShock=stype==='shock';
        const bodyCol=isShock?'#5a2888':'#4a6030';
        const bodyHL =isShock?'#7a44aa':'#607848';

        // ライフルの配置をタイプで変える
        if(isShock){
            // shock: ライフルを横に落とした（膝元）
            rifle(cx-2,y+9,0);
        }else{
            // normal: ライフルを斜めに持ちかけてる（手元にある）
            rifle(cx-4,y+7,1);
        }

        // 右脚（後ろ・伸ばしてる）
        ctx.fillStyle='#2a3818';
        px(cx+1,y+5,3,5);
        ctx.fillStyle='#0d0d08'; px(cx+0,y+9,5,2);

        // 左脚（前膝・地面に着く）
        ctx.fillStyle='#2a3818';
        px(cx-5,y+6,5,4);
        ctx.fillStyle='#0d0d08'; px(cx-6,y+9,5,2);

        // 両腕（力なく垂れる）
        ctx.fillStyle=bodyCol;
        px(cx-5,y+4,2,5);
        px(cx+2,y+4,2,5);

        // 体
        ctx.fillStyle=bodyCol; px(cx-3,y+3,7,4);
        ctx.fillStyle=bodyHL;  px(cx-2,y+3,5,2);

        // 頭（うな垂れ）
        ctx.fillStyle='#c8a060'; px(cx-2,y+0,5,4);
        ctx.fillStyle='#5a3820';
        px(cx-1,y+2,2,1); px(cx+1,y+2,2,1); // 閉じた目

        // ヘルメット（真っ直ぐ・正常着用）
        soldierHelmet(cx,y-2,0);

        if(isShock){
            const pulse=.22+Math.sin(t*.3)*.1;
            ctx.globalAlpha=pulse;
            ctx.fillStyle='#8833cc'; px(cx-5,y-2,11,13);
            ctx.globalAlpha=1;
            if(blink) txo('SHOCK',cx,y-4,'#cc44ff',5);
        }else{
            if(blink){ctx.fillStyle='#44ff88';px(cx,y-4,2,5);px(cx-1,y-3,4,2);}
        }
    }
}

function drawObs(){
    obs.forEach(o=>{
        if(o.hit)return;
        const dx=o.sx-scroll;
        if(dx<-20||dx>W+20)return;
        if(o.t==='exp'){
            // 爆発：赤オレンジ丸
            ctx.fillStyle='#cc2200';
            ctx.beginPath();ctx.arc(dx+o.w/2,o.sy+o.h/2,o.w/2,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ff8800';
            ctx.beginPath();ctx.arc(dx+o.w/2,o.sy+o.h/2,o.w*.35,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffff44';
            ctx.beginPath();ctx.arc(dx+o.w/2,o.sy+o.h/2,o.w*.14,0,Math.PI*2);ctx.fill();
        }else if(o.t==='mg'){
            // 機銃：オレンジ横帯
            ctx.fillStyle='#ff5500'; px(dx,o.sy,o.w,o.h);
            ctx.fillStyle='#ffdd00'; px(dx,o.sy,o.w,2);
        }else{
            // 有刺鉄線：紫四角
            ctx.fillStyle='#880088'; px(dx,o.sy,o.w,o.h);
            ctx.fillStyle='#ff00ff'; px(dx,o.sy,o.w,1);
        }
    });
}

// ===== 地上敵描画 =====
function drawEnemies(){
    enemies.forEach(en=>{
        const dx=en.sx-scroll;
        if(dx<-20||dx>W+20)return;
        const x=dx, y=en.sy, cx=x+5;

        if(en.type==='rush'){
            // 突進兵（赤系制服・前傾み走行ポーズ）
            const loff=Math.floor(en.fr*.28)%2===0?2:-2;
            // 脚（走行アニメ）
            ctx.fillStyle='#601808';
            px(cx-3+loff,y+10,3,4); px(cx+0-loff,y+10,3,4);
            ctx.fillStyle='#111'; px(cx-3+loff,y+13,4,1); px(cx-1-loff,y+13,4,1);
            // 体（前傾き・攻撃姿勢）
            ctx.fillStyle='#882010'; px(cx-3,y+4,7,7);
            ctx.fillStyle='#aa2818'; px(cx-2,y+4,5,3);
            // 腕（前に突き出し）
            ctx.fillStyle='#882010'; px(cx-5,y+5,3,4); px(cx+3,y+4,3,4);
            // 頭
            ctx.fillStyle='#c8a060'; px(cx-2,y+0,5,5);
            ctx.fillStyle='#5a1010'; px(cx-1,y+2,2,1); px(cx+1,y+2,2,1); // 目（怒り）
            // ヘルメット（敵側・ダーク）
            ctx.fillStyle='#181810'; px(cx-3,y-2,7,4);
            ctx.fillStyle='#2a2a18'; px(cx-3,y-2,7,1);
            ctx.fillStyle='#121210'; px(cx-4,y+1,9,1); // ブリム

        }else{
            // 狙撃兵（ダーク制服・ライフル構え）
            // ライフル（左方向へ突き出し）
            ctx.fillStyle='#1e1208'; px(x-8,y+6,14,2);
            ctx.fillStyle='#333'; px(x-8,y+6,1,2); // マズル
            ctx.fillStyle='#2a1e10'; px(x+1,y+5,3,4); // 銃床
            // 脚（直立）
            ctx.fillStyle='#283820'; px(cx-3,y+10,3,4); px(cx+0,y+10,3,4);
            ctx.fillStyle='#111'; px(cx-4,y+13,5,1); px(cx,y+13,5,1);
            // 体
            ctx.fillStyle='#283820'; px(cx-3,y+4,7,7);
            ctx.fillStyle='#1e2a18'; px(cx-2,y+4,5,3);
            // 腕（ライフル構え）
            ctx.fillStyle='#283820'; px(cx-5,y+6,3,3); px(cx-3,y+7,4,2);
            // 頭
            ctx.fillStyle='#c8a060'; px(cx-2,y+0,5,5);
            ctx.fillStyle='#111'; px(cx-1,y+2,1,1); px(cx+1,y+2,1,1);
            // ヘルメット（敵側）
            ctx.fillStyle='#181810'; px(cx-3,y-2,7,4);
            ctx.fillStyle='#2a2a18'; px(cx-3,y-2,7,1);
            ctx.fillStyle='#121210'; px(cx-4,y+1,9,1);
            // 射撃フラッシュ
            if(en.shotFlash>0){
                ctx.globalAlpha=en.shotFlash/6;
                ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(x-8,y+7,4,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(x-8,y+7,6,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=1;
            }
        }
    });

    // 敵弾（黄色トレーサー）
    enemyBullets.forEach(b=>{
        const bx=b.sx-scroll;
        if(bx<-10||bx>W+10)return;
        ctx.fillStyle='#ffdd22'; px(bx-2,b.sy-1,5,2);
        ctx.fillStyle='rgba(255,200,0,.35)'; px(bx-2,b.sy-1,12,2); // トレーサー
    });
}

// ===== 航空脅威描画 =====
function drawAirThreats(){
    ctx.save();

    // ─── サーチライト（背景レイヤー・先に描画）───
    airThreats.forEach(a=>{
        if(a.type!=='heli'||!['search','warn','gun'].includes(a.phase))return;
        const lx=a.x+a.sxOff, ly=a.y+10;
        const hot=detected>0;
        // 光柱コーン
        ctx.globalAlpha=.11;
        ctx.fillStyle=hot?'#ff5533':'#ffffcc';
        ctx.beginPath();
        ctx.moveTo(lx-6,ly);ctx.lineTo(lx+6,ly);
        ctx.lineTo(lx+24,GY);ctx.lineTo(lx-24,GY);
        ctx.closePath();ctx.fill();
        // 地面スポット
        ctx.globalAlpha=.38+Math.sin(t*.35)*.13;
        ctx.fillStyle=hot?'#ff5533':'#ffff88';
        ctx.beginPath();ctx.ellipse(lx,GY,20,5,0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    });

    // ─── 攻撃ヘリ本体 ───
    airThreats.forEach(a=>{
        const {x,y,dir}=a;
        if(x<-130||x>W+130)return;
        if(a.type!=='heli')return;
        const hw=28,hh=10;
        // ローター（回転アニメ）
        const ra=(t/3)%Math.PI;
        ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(x+Math.cos(ra)*hw*.8,y-2+Math.sin(ra)*3);
        ctx.lineTo(x-Math.cos(ra)*hw*.8,y-2-Math.sin(ra)*3);
        ctx.stroke();
        // テール
        const tx=dir<0?x+hw/2:x-hw/2-9;
        ctx.fillStyle='#2a3820'; px(tx,y+2,9,4);
        ctx.fillStyle='#1a2818'; px(tx,y+4,9,2);
        // テールローター（縦回転）
        const tra=(t/2)%Math.PI, trx=dir<0?x+hw/2+5:x-hw/2-5;
        ctx.strokeStyle='#666'; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(trx,y+2+Math.cos(tra)*5);ctx.lineTo(trx,y+7-Math.cos(tra)*5);
        ctx.stroke();
        // ボディ
        ctx.fillStyle='#2a4020'; px(x-hw/2,y,hw,hh);
        ctx.fillStyle='#1e2e18'; px(x-hw/2,y,hw,3);
        ctx.fillStyle='#3a5028'; px(x-hw/2,y+3,hw,2);
        // コックピット
        ctx.fillStyle='#1a2a44'; px(x-7,y+3,14,5);
        ctx.fillStyle='#2a3a55'; px(x-5,y+3,6,3);
        // 機銃（機首下部）
        const gx=dir<0?x+hw/2:x-hw/2-5;
        ctx.fillStyle='#0d0d0d'; px(gx,y+7,6,3); px(gx+(dir<0?5:-1),y+8,4,2);
        // 点滅灯
        if(Math.floor(t/6)%2===0){
            ctx.fillStyle='#ff2222';ctx.beginPath();ctx.arc(x-hw/2+2,y+hh-2,1.5,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#00ff44';ctx.beginPath();ctx.arc(x+hw/2-2,y+hh-2,1.5,0,Math.PI*2);ctx.fill();
        }
        // 機銃発射炎
        if(a.gunFlash>0){
            ctx.globalAlpha=a.gunFlash/8;
            ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(gx+(dir<0?8:0),y+9,4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(gx+(dir<0?8:0),y+9,6,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
        }
        // 照準線（warn phase: 斜め赤点線→ジャンプで越えると安全）
        if(a.phase==='warn'){
            const lmx=a.x+14, lmy=a.y+9;
            ctx.globalAlpha=.28+Math.sin(t*.5)*.18;
            ctx.strokeStyle='#ff4400'; ctx.lineWidth=1;
            ctx.setLineDash([3,4]);
            ctx.beginPath();ctx.moveTo(lmx,lmy);ctx.lineTo(PX+P.w/2,GY-6);ctx.stroke();
            ctx.setLineDash([]);
            // マズル先端の照準点
            ctx.fillStyle='#ff4400';ctx.globalAlpha=.5+Math.sin(t*.5)*.3;
            ctx.beginPath();ctx.arc(PX+P.w/2,GY-6,3,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
        }
    });

    // ─── 爆撃機本体 ───
    airThreats.forEach(a=>{
        if(a.type!=='bomber')return;
        const {x,y,dir}=a;
        if(x<-130||x>W+130)return;
        const bw=42,bh=7;
        // 主翼（細長い）
        ctx.fillStyle='#202020'; px(x-bw/2-14,y+3,bw+28,3);
        // 胴体
        ctx.fillStyle='#282828'; px(x-bw/2,y,bw,bh);
        ctx.fillStyle='#1a1a1a'; px(x-bw/2,y,bw,2);
        ctx.fillStyle='#383838'; px(x-bw/2,y+2,bw,2);
        // 機首
        const nx=dir<0?x+bw/2:x-bw/2-4;
        ctx.fillStyle='#111'; px(nx,y+2,4,3);
        // 尾翼
        ctx.fillStyle='#1e1e1e'; px(dir<0?x-bw/2-2:x+bw/2-2,y-4,4,10);
        // エンジン4基
        ctx.fillStyle='#1a1a1a';
        [-16,-6,5,15].forEach(ox=>{px(x+ox,y+4,6,5);});
        if(Math.floor(t/3)%2){
            ctx.fillStyle='#ff6600';
            [-16,-6,5,15].forEach(ox=>{px(x+ox+(dir<0?0:5),y+7,3,2);});
        }
    });

    // ─── 機銃弾 ───
    airBullets.forEach(b=>{
        const a=Math.min(1,b.life/20);
        ctx.globalAlpha=a;
        ctx.fillStyle='#ffee44'; px(b.x-1,b.y,2,4);
        ctx.fillStyle='rgba(255,200,50,.38)'; px(b.x-1,b.y-5,2,5);
    });
    ctx.globalAlpha=1;

    ctx.restore();

    // ─── 爆弾（落下中・地面マーカー）───（shakeの外で描画）
    airBombs.forEach(b=>{
        if(b.phase!=='fall')return;
        const bx=b.sx-scroll;
        if(bx<-40||bx>W+40)return;
        // 着弾警告（地面・赤丸+X）
        ctx.globalAlpha=.35+Math.sin(t*.55)*.25;
        ctx.strokeStyle='#ff2200'; ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(bx,GY,20,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx-9,GY-5);ctx.lineTo(bx+9,GY+5);
        ctx.moveTo(bx+9,GY-5);ctx.lineTo(bx-9,GY+5);
        ctx.stroke();
        ctx.globalAlpha=1;
        // 地面シャドウ（近づくほど拡大）
        const shadowR=4+Math.floor(16*b.y/(GY-4));
        ctx.globalAlpha=.35;
        ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(bx,GY+2,shadowR,3,0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        // 爆弾本体
        ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(bx,b.y,3,5,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#444';ctx.beginPath();ctx.ellipse(bx-1,b.y-2,1.5,2.5,0,0,Math.PI*2);ctx.fill();
        // 尾翼フィン
        ctx.fillStyle='#333'; px(bx-3,b.y-9,6,4);
        ctx.fillStyle='#1a1a1a'; px(bx-1,b.y-11,1,6); px(bx+1,b.y-11,1,6);
    });
}

function drawHeli(){
    const hx=heliP-scroll;
    if(hx<-60||hx>W+60)return;
    const hy=GY-65, hw=32, hh=12;

    // グロー
    ctx.globalAlpha=.1;ctx.fillStyle='#00ff00';
    ctx.beginPath();ctx.arc(hx,hy+hh/2,55,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    // ボディ（緑四角）
    ctx.fillStyle='#006600'; px(hx-hw/2,hy,hw,hh);
    ctx.fillStyle='#00aa00'; px(hx-hw/2,hy,hw,4);
    // 窓（青四角）
    ctx.fillStyle='#004488'; px(hx-6,hy+3,12,5);
    // テール
    ctx.fillStyle='#004400'; px(hx+hw/2,hy+2,hw*.4,4);

    // ローター（回転線）
    const ba=(t/4)%Math.PI;
    ctx.strokeStyle='#aaa';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(hx+Math.cos(ba)*hw*.8,hy-3+Math.sin(ba)*4);
    ctx.lineTo(hx-Math.cos(ba)*hw*.8,hy-3-Math.sin(ba)*4);
    ctx.stroke();

    // ロープ（3本）
    ctx.strokeStyle='#888';ctx.lineWidth=1;
    for(let r=-1;r<=1;r++){ctx.beginPath();ctx.moveTo(hx+r*10,hy+hh);ctx.lineTo(hx+r*10,GY);ctx.stroke();}

    // 点滅灯
    if(Math.floor(t/8)%2===0){
        ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(hx-hw/2+2,hy+hh-2,2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#00ff00';ctx.beginPath();ctx.arc(hx+hw/2-2,hy+hh-2,2,0,Math.PI*2);ctx.fill();
    }

    // 搭乗可否インジケーター（テキスト不使用：カラーバー+人アイコン）
    const ok=rescued>=GOALS[stage-1];
    ctx.fillStyle=ok?'#00ff00':'#444';  px(hx-14,hy-20,28,6);
    ctx.fillStyle=ok?'#003300':'#880000'; px(hx-14,hy-20,28,3);
    // 救助済み人数：小さい四角で表現
    for(let i=0;i<GOALS[stage-1];i++){
        ctx.fillStyle=i<rescued?'#00ff88':'#333';
        px(hx-12+i*7,hy-18,5,4);
    }
}

// ハート描画ヘルパー（中心cx,cy、サイズs、色c）
function drawHeart(cx,cy,s,c){
    ctx.fillStyle=c;
    // 上2つの丸
    ctx.beginPath();ctx.arc(cx-s*.25,cy-s*.1,s*.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+s*.25,cy-s*.1,s*.3,0,Math.PI*2);ctx.fill();
    // 下の三角
    ctx.beginPath();
    ctx.moveTo(cx-s*.55,cy-s*.05);
    ctx.lineTo(cx,cy+s*.55);
    ctx.lineTo(cx+s*.55,cy-s*.05);
    ctx.closePath();ctx.fill();
}

// ===== アイテムスロット（横一列）=====
function drawItemSlots(){
    const has=P.boots||P.vest||P.grenade||P.tourn>0||P.morph>0||rushTimer>0||wingTimer>0;
    if(!has)return;
    // 左下固定（地面より下のデッドゾーン・右下ボタンと干渉しない）
    let sx=3;
    const sy=H-16, sw=10, sh=10, sg=3;
    // スロット数を先に数えてバー幅を決定
    let cnt=0;
    if(P.boots)cnt++;if(P.vest)cnt++;if(P.grenade)cnt++;
    if(P.tourn>0)cnt+=(P.tourn>1?1.5:1);if(P.morph>0)cnt+=(P.morph>1?1.5:1);
    if(rushTimer>0)cnt++;if(wingTimer>0)cnt++;
    const barW=Math.ceil(cnt*(sw+sg))+2;
    ctx.fillStyle='rgba(0,0,0,.80)'; ctx.fillRect(0,sy-2,barW,sh+4);
    ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(0,sy-2,barW,sh+4);

    function slotBG(x){
        ctx.fillStyle='#111'; ctx.fillRect(x,sy-1,sw,sh+2);
        ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(x,sy-1,sw,sh+2);
    }
    function next(extra){sx+=sw+sg+(extra||0);}

    if(P.boots){
        slotBG(sx);
        ctx.fillStyle='#ffdd00'; px(sx+1,sy+2,8,4);
        ctx.fillStyle='#ff8800'; px(sx,sy+5,10,3);
        ctx.fillStyle='#cc6600'; px(sx,sy+7,10,2);
        next();
    }
    if(P.vest){
        slotBG(sx);
        ctx.fillStyle='#1a55bb'; px(sx+1,sy,8,9); ctx.fillStyle='#0e3a88'; px(sx,sy+2,10,5);
        ctx.fillStyle='#4488ee'; px(sx+2,sy+1,6,4);
        ctx.fillStyle='#fff'; px(sx+4,sy+1,2,8); px(sx+2,sy+4,6,2);
        next();
    }
    if(P.grenade){
        slotBG(sx);
        ctx.fillStyle='#228822'; px(sx+2,sy+2,6,7);
        ctx.fillStyle='#44cc44'; px(sx+3,sy+1,4,3);
        ctx.fillStyle='#888'; px(sx+4,sy,2,2);
        ctx.fillStyle='#004400'; px(sx+2,sy+5,6,1);
        next();
    }
    if(P.tourn>0){
        slotBG(sx);
        ctx.fillStyle='#dd2222'; px(sx,sy+3,10,4); ctx.fillStyle='#ff4444'; px(sx+3,sy,4,10);
        ctx.fillStyle='rgba(255,255,255,.7)'; px(sx+1,sy+4,8,2); px(sx+4,sy+1,2,8);
        if(P.tourn>1){txo('×'+P.tourn,sx+sw+1,sy+9,'#ff8888',5,'left');next(5);}else next();
    }
    if(P.morph>0){
        slotBG(sx);
        ctx.fillStyle='#7722aa'; px(sx+3,sy,4,9); ctx.fillStyle='#cc88ff'; px(sx+4,sy+1,2,5);
        ctx.fillStyle='#aaa'; px(sx+4,sy+8,2,2); ctx.fillStyle='#ddd'; px(sx+5,sy+9,1,2);
        if(P.morph>1){txo('×'+P.morph,sx+sw+1,sy+9,'#cc88ff',5,'left');next(5);}else next();
    }
    if(rushTimer>0){
        slotBG(sx);
        const rp=rushTimer/RUSH_DUR;
        ctx.fillStyle=`hsl(${40+rp*20},100%,55%)`;
        px(sx+5,sy,3,3); px(sx+3,sy+2,7,1); px(sx+3,sy+3,5,3); px(sx+4,sy+6,3,1); px(sx+4,sy+7,3,2);
        ctx.fillStyle='#333'; px(sx,sy+sh,sw,2);
        ctx.fillStyle=`hsl(${40+rp*20},100%,55%)`; px(sx,sy+sh,Math.floor(sw*rp),2);
        next();
    }
    if(wingTimer>0){
        slotBG(sx);
        ctx.fillStyle='#445544'; px(sx+1,sy+1,8,7); ctx.fillStyle='#223322'; px(sx+2,sy+2,6,4);
        ctx.fillStyle='#667766'; px(sx+2,sy+6,2,2); px(sx+6,sy+6,2,2);
        const jf=jetting&&Math.floor(t/3)%2;
        ctx.fillStyle=jf?'#ff5500':'#ff8800'; px(sx+2,sy+8,2,2); px(sx+6,sy+8,2,2);
        const wp=wingTimer/WING_DUR;
        ctx.fillStyle='#333'; px(sx,sy+sh,sw,2);
        ctx.fillStyle=`hsl(45,100%,${55+wp*15|0}%)`; px(sx,sy+sh,Math.floor(sw*wp),2);
        next();
    }
}

// ===== UI（テキスト最小化・図形中心） =====
function drawUI(){
    // HUDバー（HP分の高さを確保）
    ctx.fillStyle='rgba(0,0,0,.80)';ctx.fillRect(0,0,W,22);

    // ステージ番号
    ctx.fillStyle=stage===1?'#4488ff':stage===2?'#ff8800':'#ff4444';
    px(1,1,11,12);
    txo(stage,7,11,'#ffffff',9);

    // HPハートアイコン（左上、ステージバッジ右隣）
    for(let i=0;i<P.mhp;i++){
        drawHeart(17+i*11,8,4.5,i<P.hp?'#ff2244':'#441122');
    }

    // 救助数：人型アイコン（小四角）
    for(let i=0;i<GOALS[stage-1];i++){
        ctx.fillStyle=i<rescued?'#00ff88':'#224422';
        px(15+i*8,15,6,6);
    }

    // ヘリまでの距離バー（中央）
    const dist=Math.max(0,heliP-scroll);
    const prog=Math.min(1,(heliP-dist)/heliP);
    const bx=W/2-22, bw=44;
    ctx.fillStyle='#222'; ctx.fillRect(bx,4,bw,6);
    const bc=prog>.85?'#ff4444':prog>.6?'#ffaa00':'#00cc44';
    ctx.fillStyle=bc; ctx.fillRect(bx,4,bw*prog,6);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,4,bw,6);
    txo(Math.max(0,Math.floor(dist/10))+'m',W/2,13,'#aaffaa',6);
    txo(score+'pt',W-2,10,'#ffff44',7,'right');

    drawItemSlots();

    // アクションボタン（右下）
    ctx.globalAlpha=.5;
    // btnFlash：補給演出で一瞬白く大きく点灯
    const bfR=btnFlash>0?BTN_R+btnFlash*.3:BTN_R;
    if(btnFlash>0){
        ctx.globalAlpha=btnFlash/35*.8;
        ctx.fillStyle='#ffffff';
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,bfR+4,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.5;
    }
    if(P.grenade){
        // 所持中：緑に点灯
        ctx.fillStyle='#225522';
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,bfR,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=btnFlash>0?'#ffffff':'#44ff44';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,bfR,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=.9;
        // 発煙筒アイコン（緑円筒）
        ctx.fillStyle='#228822';px(BTN_X-4,BTN_Y-5,8,10);
        ctx.fillStyle='#44cc44';px(BTN_X-3,BTN_Y-6,6,4);
        ctx.fillStyle='#aaa';px(BTN_X-1,BTN_Y-8,2,3);
    }else if(smokeAura>0){
        // 発動中：白くパルス
        const pulse=.6+Math.sin(t*.3)*.4;
        ctx.fillStyle='rgba(180,220,180,'+pulse+')';
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,BTN_R,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,BTN_R,0,Math.PI*2);ctx.stroke();
        // 残り時間アーク
        ctx.globalAlpha=.8;
        const ap=smokeAura/SMOKE_DUR;
        ctx.strokeStyle='#aaffaa';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,BTN_R-2,-Math.PI/2,-Math.PI/2+Math.PI*2*ap);ctx.stroke();
    }else{
        // 未所持：グレーアウト
        ctx.fillStyle='#111';
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,BTN_R,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#333';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(BTN_X,BTN_Y,BTN_R,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // 接近アラート（図形）
    if(gmsg){
        const col=gmsg==='接近中'?'#ffff44':gmsg==='ヘリ視認！'?'#ff8800':'#ff4444';
        const pulse=.75+Math.sin(t*.2)*.25;
        ctx.globalAlpha=pulse;
        ctx.fillStyle=col; ctx.fillRect(W/2-18,17,36,10);
        txo(gmsg,W/2,25,'#000000',6);
        ctx.globalAlpha=1;
    }

    // 救助ポップアップ（数字）
    if(rtxt){
        ctx.globalAlpha=rtxt.t/25;
        ctx.fillStyle=rtxt.mul>1?'#ffff00':'#00ff88';
        ctx.font='bold 7px monospace';ctx.textAlign='center';
        ctx.fillText('+'+100*rtxt.mul,rtxt.x,rtxt.y-4);
        ctx.globalAlpha=1;
    }

    // コンボ
    if(ctxt&&ctxt.n>1){
        ctx.globalAlpha=ctxt.t/40;
        ctx.fillStyle='#ffff00';ctx.font='bold 8px monospace';ctx.textAlign='center';
        ctx.fillText('x'+ctxt.n,W/2,46);
        ctx.globalAlpha=1;
    }
}

function drawOver(){
    if(!['start','gameover','stageclear'].includes(gs))return;
    ctx.fillStyle='rgba(0,0,0,.94)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(gs==='start'){
        // タイトル図形：赤十字マーク大
        ctx.fillStyle='#cc0000'; ctx.fillRect(W/2-20,H/2-105,40,40);
        ctx.fillStyle='#ff2222'; ctx.fillRect(W/2-6,H/2-112,12,54); ctx.fillRect(W/2-20,H/2-98,40,12);
        ctx.fillStyle='#ffffff'; ctx.fillRect(W/2-4,H/2-110,8,50); ctx.fillRect(W/2-18,H/2-96,36,8);
        txo('FIELD MEDIC',W/2,H/2-50,'#ff6622',11);
        txo('TAP = JUMP',W/2,H/2-18,'#aaaaaa',7);
        txo('touch wounded > rescue',W/2,H/2-4,'#aaaaaa',7);
        txo('reach the HELI',W/2,H/2+10,'#aaaaaa',7);
        txo('[ TAP TO START ]',W/2,H/2+40,'#44ff44',8);
        if(best>0)txo('BEST:'+best+'pt  TOTAL:'+totR,W/2,H/2+62,'#ffff44',7);
    }else if(gs==='gameover'){
        // X マーク
        ctx.strokeStyle='#ff4444';ctx.lineWidth=4;
        ctx.beginPath();ctx.moveTo(W/2-20,H/2-110);ctx.lineTo(W/2+20,H/2-70);ctx.stroke();
        ctx.beginPath();ctx.moveTo(W/2+20,H/2-110);ctx.lineTo(W/2-20,H/2-70);ctx.stroke();
        txo('GAME OVER',W/2,H/2-50,'#ff4444',11);
        const lx=W/2-46;
        txo('Rescued : '+rescued,lx,H/2-14,'#cccccc',7,'left');
        txo('Damage  : '+dmg,     lx,H/2+2, '#cccccc',7,'left');
        txo('Score   : '+score+'pt',lx,H/2+18,'#ffff44',7,'left');
        txo('Best    : '+best+'pt', lx,H/2+34,'#ffaa44',7,'left');
        txo('[ TAP TO RETRY ]',W/2,H/2+62,'#44ff44',8);
    }else{
        // チェックマーク
        ctx.strokeStyle='#00ff00';ctx.lineWidth=4;
        ctx.beginPath();ctx.moveTo(W/2-18,H/2-88);ctx.lineTo(W/2-6,H/2-74);ctx.lineTo(W/2+22,H/2-108);ctx.stroke();
        txo('STAGE '+stage+' CLEAR',W/2,H/2-56,'#44ff44',10);
        const lx=W/2-46;
        txo('Rescued : '+rescued,lx,H/2-20,'#cccccc',7,'left');
        txo('Damage  : '+dmg,     lx,H/2-4, '#cccccc',7,'left');
        txo('Score   : '+score+'pt',lx,H/2+12,'#ffff44',7,'left');
        txo('Best    : '+best+'pt', lx,H/2+28,'#ffaa44',7,'left');
        txo(stage<3?'[ TAP NEXT STAGE ]':'[ MISSION COMPLETE ]',W/2,H/2+58,'#44ff44',8);
    }
}

// ===== DRAW =====
function draw(){
    const sx=Math.round((Math.random()-.5)*shake), sy=Math.round((Math.random()-.5)*shake);
    ctx.save();ctx.translate(sx,sy);

    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    drawBg();

    // アイテム描画（type別）
    items.forEach(it=>{
        if(it.got)return;
        const dx=it.sx-scroll;if(dx<-10||dx>W+10)return;
        const blink=Math.floor(t/8)%2===0;
        if(it.type==='boots'){
            ctx.fillStyle='#ffdd00';px(dx+1,it.sy+2,7,5);
            ctx.fillStyle='#ff8800';px(dx,it.sy+6,9,3);
            if(blink){ctx.fillStyle='#fff';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='vest'){
            // 防弾ベスト：青い盾型
            ctx.fillStyle='#2266cc';px(dx,it.sy,8,8);
            ctx.fillStyle='#88aaff';px(dx+1,it.sy+1,6,3);
            ctx.fillStyle='#ffffff';px(dx+3,it.sy+2,2,4);px(dx+2,it.sy+4,4,2);
            if(blink){ctx.fillStyle='#aaccff';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='grenade'){
            // 発煙筒：緑円筒
            ctx.fillStyle='#228822';px(dx+1,it.sy+2,6,7);
            ctx.fillStyle='#44cc44';px(dx+2,it.sy+1,4,3);
            ctx.fillStyle='#888';px(dx+3,it.sy,2,2);
            if(blink){ctx.fillStyle='#aaffaa';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='heart'){
            // ハート：ピンク
            drawHeart(dx+4,it.sy+4,4.5,'#ff4488');
            if(blink){ctx.fillStyle='#ffaacc';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='tourn'){
            // 止血帯：赤い包帯十字
            ctx.fillStyle='#cc0000';px(dx,it.sy+3,9,3);
            ctx.fillStyle='#ff4444';px(dx+3,it.sy,3,9);
            ctx.fillStyle='#ffffff';px(dx+1,it.sy+4,7,1);px(dx+4,it.sy+1,1,7);
            if(blink){ctx.fillStyle='#ff8888';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='morph'){
            // モルヒネ注射器：紫シリンジ
            ctx.fillStyle='#7722aa';px(dx+2,it.sy+1,5,8);
            ctx.fillStyle='#cc88ff';px(dx+3,it.sy+2,3,4);
            ctx.fillStyle='#aaaaaa';px(dx+4,it.sy,1,2);px(dx+1,it.sy+8,6,2);
            if(blink){ctx.fillStyle='#cc88ff';px(dx+3,it.sy-2,2,2);}
        }else if(it.type==='jetpack'){
            // ジェットパック：軍用背負い式
            ctx.fillStyle='#445544';
            px(dx+1,it.sy,6,6);         // ボディ
            ctx.fillStyle='#223322';
            px(dx+2,it.sy+1,4,3);       // パネル
            ctx.fillStyle='#667766';
            px(dx+2,it.sy+4,2,2);       // 左ノズル
            px(dx+5,it.sy+4,2,2);       // 右ノズル
            // 噴射炎（点滅）
            const flm=Math.floor(t/4)%2;
            ctx.fillStyle=flm?'#ff8800':'#ff4400';
            px(dx+2,it.sy+6,2,2);
            px(dx+5,it.sy+6,2,2);
            if(blink){ctx.fillStyle='#ffaa44';px(dx+3,it.sy-2,2,2);}
        }
    });

    drawObs();
    drawEnemies();

    // モルタル砲描画（地面上の警告サークル→爆発）
    mortars.forEach(m=>{
        const dx=m.sx-scroll;
        if(dx<-50||dx>W+50)return;
        if(m.state==='warn'){
            const fast=m.life>72;
            const blink=Math.floor(t/(fast?3:7))%2===0;
            ctx.globalAlpha=.8;
            ctx.strokeStyle=blink?'#ff2200':'#ff7700';
            ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(dx,GY,m.r,0,Math.PI,true);ctx.stroke(); // 上半円
            if(blink){
                ctx.fillStyle='#ff3300';ctx.globalAlpha=.28;
                ctx.beginPath();ctx.arc(dx,GY,m.r,0,Math.PI,true);ctx.fill();
            }
            ctx.globalAlpha=1;
            ctx.fillStyle=blink?'#ff2200':'#cc4400';
            px(dx-1,GY-Math.round(m.r*.6),2,Math.round(m.r*.6)); // 縦線
            px(dx-4,GY-Math.round(m.r*.35),8,2);                  // 横線
        }else{
            const prog=m.life/m.maxLife;
            ctx.globalAlpha=Math.max(0,1-prog)*.9;
            ctx.fillStyle='#ff4400';
            ctx.beginPath();ctx.arc(dx,GY-2,m.r*(1+prog*2.5),0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffcc00';
            ctx.beginPath();ctx.arc(dx,GY-2,m.r*.7*(1+prog),0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
        }
    });

    // 右端スポーン警告インジケーター
    pending.forEach(p=>{
        const blink=Math.floor(t/(p.delay<20?3:7))%2===0;
        if(!blink)return;
        const wy=p.sy+p.h/2;
        const col=p.type==='exp'?'#ff4400':p.type==='mg'?'#ff8800':'#cc00cc';
        ctx.fillStyle=col;
        ctx.fillRect(W-9,p.sy-1,9,p.h+2);       // 右端縦バー
        ctx.beginPath();                           // 左向き三角矢印
        ctx.moveTo(W-12,wy);
        ctx.lineTo(W-9,wy-5);
        ctx.lineTo(W-9,wy+5);
        ctx.closePath();ctx.fill();
    });

    inj.forEach(s=>{const dx=s.sx-scroll;if(!s.res&&dx>-20&&dx<W+20)drawInjured(dx,s.sy,s.type);});

    // パーティクル
    parts.forEach(p=>{ctx.globalAlpha=p.l/p.ml;ctx.fillStyle=p.c;px(p.x-1,p.y-1,2,2);});
    ctx.globalAlpha=1;

    drawHeli();
    drawAirThreats();

    // 煙幕描画（プレイヤー追従型）
    smokeCloud.forEach(p=>{
        const alpha=(1-p.life/p.maxLife)*0.58;
        const dx=p.sx-scroll;
        ctx.globalAlpha=alpha;
        ctx.fillStyle='#9aaa88';
        ctx.beginPath();ctx.arc(dx,p.sy,p.r+p.life*.12,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=alpha*.5;
        ctx.fillStyle='#ccddcc';
        ctx.beginPath();ctx.arc(dx,p.sy,(p.r+p.life*.12)*.55,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    // 煙幕オーラ（プレイヤー周囲の薄緑煙雲）
    if(smokeAura>0){
        const aRatio=smokeAura/SMOKE_DUR;
        const pulse=.18+Math.sin(t*.4)*.06;
        ctx.globalAlpha=pulse*aRatio;
        ctx.fillStyle='#88aa77';
        ctx.beginPath();ctx.arc(P.x+P.w/2,P.y+P.h/2,30,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=pulse*.6*aRatio;
        ctx.fillStyle='#cceecc';
        ctx.beginPath();ctx.arc(P.x+P.w/2,P.y+P.h/2,18,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }

    // 無敵ラッシュ：プレイヤー周囲に黄オーラ
    if(rushTimer>0){
        const ri=rushTimer/RUSH_DUR;
        ctx.globalAlpha=.28*ri+Math.sin(t*.25)*.1;
        ctx.fillStyle='#ffdd00';
        ctx.beginPath();ctx.arc(P.x+P.w/2,P.y+P.h/2,18,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.15*ri;
        ctx.fillStyle='#ffffff';
        ctx.beginPath();ctx.arc(P.x+P.w/2,P.y+P.h/2,24,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }

    if(P.inv%8<4||P.inv===0)drawMedic(P.x,P.y);

    // グレネード補給飛行パーティクル
    flyParts.forEach(fp=>{
        const a=Math.max(0,1-fp.life/fp.maxLife);
        ctx.globalAlpha=a; ctx.fillStyle='#44ff44';
        ctx.beginPath();ctx.arc(fp.x,fp.y,2.5,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    ctx.restore();

    // ADRENALINE RUSH!ポップアップ（save/restoreの外）
    if(adrenPop>0&&gs==='playing'){
        const fade=Math.min(1,adrenPop/20)*Math.min(1,adrenPop/90*4);
        ctx.globalAlpha=fade;
        ctx.fillStyle='#000'; ctx.fillRect(W/2-54,H/2-22,108,38);
        ctx.strokeStyle='#ffdd00'; ctx.lineWidth=2; ctx.strokeRect(W/2-54,H/2-22,108,38);
        ctx.fillStyle='#ffff00'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
        ctx.fillText('ADRENALINE',W/2,H/2-6);
        ctx.fillStyle='#ff8800'; ctx.font='bold 7px monospace';
        ctx.fillText('RUSH!',W/2,H/2+10);
        ctx.globalAlpha=1;
    }

    if(flash>0){ctx.globalAlpha=(flash/15)*.5;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flash--;}

    // DETECTED警告（サーチライト捕捉時）
    if(detected>0&&gs==='playing'){
        const pulse=.5+Math.sin(t*.55)*.5;
        ctx.globalAlpha=pulse*.65;
        ctx.fillStyle='#cc0000';
        ctx.fillRect(0,22,W,5); ctx.fillRect(0,GY-5,W,5);
        ctx.globalAlpha=1;
        txo('▼ DETECTED ▼',W/2,H/2+4,'#ff3333',8);
    }

    // 瀕死アドレナリンヴィネット（HP=1時、縁が赤く脈打つ）
    if(P.hp===1&&gs==='playing'){
        const pulse=.22+Math.sin(t*.13)*.18;
        const vw=20;
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ff0000';
        ctx.fillRect(0,0,vw,H);           // 左
        ctx.fillRect(W-vw,0,vw,H);        // 右
        ctx.fillRect(vw,0,W-vw*2,vw);     // 上
        ctx.fillRect(vw,H-vw,W-vw*2,vw); // 下
        ctx.globalAlpha=1;
    }

    drawUI();
    drawOver();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
