<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦場の衛生兵</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        body { display: flex; justify-content: center; align-items: center; background: #000; font-family: monospace; overflow: hidden; }
        canvas { border: 3px solid #444; background: #1a1a2a; image-rendering: pixelated; touch-action: none; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1080, H = 1920;

        const player = {
            x: 200, y: H-200, w: 64, h: 64, vy: 0, jmpPower: 15,
            onGround: true, canDJ: false, hp: 5, maxHp: 5, boots: false, inv: 0, frame: 0,
            state: 'run', rescued: 0
        };

        let gameState = 'start', stage = 1, scroll = 0, scrollSpeed = 3.5, time = 0;
        let stageGoals = [2, 3, 5];
        let score = 0, rescued = 0;
        let totalRescued = parseInt(localStorage.getItem('bf_total')) || 0;
        let highScore = parseInt(localStorage.getItem('bf_high')) || 0;
        let obs = [], inj = [], items = [], particles = [], bgEffects = [];
        let screenShake = 0, screenFlash = 0, rescueText = null;
        let combo = 0, comboTimer = 0, comboText = null;
        let heliPos = 0, heliReached = false;
        let damageCount = 0;
        let goalMessage = '';
        let safeZoneStart = 0;

        function playSound(freq, dur) {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const o = ac.createOscillator(), g = ac.createGain();
                o.connect(g); g.connect(ac.destination);
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + dur);
                o.start(ac.currentTime); o.stop(ac.currentTime + dur);
            } catch(e) {}
        }

        function particle(x, y, c, n, vx=null, vy=null) {
            for (let i = 0; i < n; i++) {
                particles.push({
                    x, y,
                    vx: vx ? vx + (Math.random()-0.5)*2 : (Math.random()-0.5)*5,
                    vy: vy ? vy + (Math.random()-0.5)*2 : (Math.random()-0.5)*4-1,
                    c, l: 30, ml: 30
                });
            }
        }

        function handleInput() {
            if (gameState === 'start') { reset(); return; }
            if (gameState === 'stageclear' && stage < 3) { stage++; reset(); return; }
            if (gameState === 'stageclear' && stage === 3) {
                totalRescued += rescued; if (score > highScore) highScore = score;
                localStorage.setItem('bf_total', totalRescued); localStorage.setItem('bf_high', highScore);
                location.reload(); return;
            }
            if (gameState === 'gameover') { location.reload(); return; }
            if (gameState === 'playing') {
                if (player.onGround) {
                    player.vy = -player.jmpPower; player.onGround = false; player.canDJ = false;
                    player.state = 'jump'; playSound(400, 0.1);
                }
                else if (player.boots && !player.canDJ) {
                    player.vy = -player.jmpPower; player.canDJ = true;
                    player.state = 'djump'; playSound(500, 0.1);
                }
            }
        }

        function onInput() {
            handleInput();
        }

        canvas.addEventListener('click', onInput);
        canvas.addEventListener('touchstart', onInput, false);
        document.addEventListener('click', onInput);
        document.addEventListener('touchstart', onInput, false);

        function reset() {
            gameState = 'playing'; scroll = 0; time = 0; score = 0; rescued = 0;
            obs = []; inj = []; items = []; particles = []; bgEffects = [];
            player.hp = 5; player.boots = false; player.y = H-200; player.vy = 0;
            player.state = 'run'; player.rescued = 0;
            combo = 0; comboTimer = 0; heliPos = 30000; heliReached = false;
            screenShake = 0; screenFlash = 0; damageCount = 0;
            goalMessage = '';
            safeZoneStart = heliPos - 3000;
        }

        function update() {
            if (gameState !== 'playing') return;
            time++; player.frame++;

            scroll += scrollSpeed;
            player.vy += 0.6;
            player.y += player.vy;

            if (player.y + player.h >= H-80) {
                player.y = H-80-player.h;
                player.vy = 0;
                player.onGround = true;
                player.canDJ = false;
                if (player.state !== 'damage') player.state = 'run';
            } else {
                player.onGround = false;
            }

            player.inv = Math.max(0, player.inv - 1);

            let genX = scroll + W;
            let distToHeli = heliPos - scroll;

            // ゴール接近演出
            if (distToHeli < 4000 && distToHeli > 3000) goalMessage = '避難ポイント接近中';
            else if (distToHeli < 3000 && distToHeli > 2000) goalMessage = 'ヘリコプター視認';
            else if (distToHeli < 2000 && distToHeli > 0) goalMessage = 'ゴール間近';
            else if (distToHeli <= 0) goalMessage = '';

            // 安全地帯：敵出現停止
            let inSafeZone = scroll >= safeZoneStart;

            if (!inSafeZone) {
                let difficulty = 1.0 + (scroll / heliPos) * 0.8;

                if (time % Math.max(20, Math.floor(70 / difficulty)) === 0) {
                    let rnd = Math.random();
                    if (rnd < 0.6) {
                        obs.push({sx: genX, sy: H-140, w: 60, h: 60, t: 'exp'});
                    } else if (rnd < 0.8 && stage >= 2) {
                        obs.push({sx: genX, sy: H-180, w: 200, h: 30, t: 'mg'});
                    } else if (stage >= 3) {
                        obs.push({sx: genX, sy: H-80, w: 50, h: 50, t: 'wire'});
                    }
                }

                if (time % Math.max(40, Math.floor((150-stage*15) / difficulty)) === 0) {
                    inj.push({sx: genX, sy: H-140, w: 48, h: 48, res: false, carried: false});
                }

                if (time % 280 === 0 && Math.random() < 0.5) {
                    items.push({sx: genX, sy: H-160, w: 30, h: 30, t: 'boots'});
                }
            }

            obs.forEach((o, i) => {
                if (player.inv <= 0 && player.x < o.sx+o.w && player.x+player.w > o.sx &&
                    player.y < o.sy+o.h && player.y+player.h > o.sy) {
                    player.hp--; player.boots = false; player.inv = 30;
                    player.state = 'damage'; player.vy = -8;
                    damageCount++;
                    screenShake = 12; screenFlash = 20;
                    for (let j = 0; j < 30; j++) {
                        let angle = (Math.PI * 2 * j) / 30;
                        let colors = ['#ffffff', '#ffff00', '#ff8800', '#ff4444'];
                        particles.push({x: o.sx+o.w/2, y: o.sy+o.h/2, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4, c: colors[Math.floor(Math.random()*colors.length)], l: 40, ml: 40});
                    }
                    playSound(100, 0.3);
                    obs.splice(i, 1);
                }
            });

            items.forEach((it, i) => {
                if (player.x < it.sx+it.w && player.x+player.w > it.sx &&
                    player.y < it.sy+it.h && player.y+player.h > it.sy) {
                    player.boots = true;
                    particle(it.sx, it.sy, '#ffff00', 15);
                    items.splice(i, 1);
                }
            });

            inj.forEach(i => {
                if (player.x < i.sx+i.w && player.x+player.w > i.sx &&
                    player.y < i.sy+i.h && player.y+player.h > i.sy && !i.res) {
                    i.res = true; rescued++; combo++;
                    i.carried = true;
                    let baseScore = 100;
                    let comboMultiplier = Math.min(5, Math.floor(combo / 2) + 1);
                    score += baseScore * comboMultiplier;
                    comboTimer = 120;
                    screenShake = 6;
                    rescueText = {x: i.sx+i.w/2, y: i.sy-20, t: 25, show: true, multiplier: comboMultiplier};
                    comboText = {x: W/2, y: 100, t: 40, show: true, combo: combo};
                    for (let j = 0; j < 30; j++) {
                        particles.push({x: i.sx+i.w/2, y: i.sy+i.h/2, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5-1, c: '#00ff00', l: 35, ml: 35});
                    }
                    playSound(800, 0.4);
                }
            });

            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.l--;
                return p.l > 0;
            });

            bgEffects = bgEffects.filter(e => {
                e.life--;
                e.x -= 1.5;
                return e.life > 0 && e.x > -200;
            });

            if (rescueText) rescueText.t--;
            if (rescueText && rescueText.t <= 0) rescueText = null;

            comboTimer--;
            if (comboTimer <= 0) combo = 0;
            if (comboText) comboText.t--;
            if (comboText && comboText.t <= 0) comboText = null;

            if (player.hp <= 0) {
                gameState = 'gameover';
                totalRescued += rescued;
                if (score > highScore) highScore = score;
                localStorage.setItem('bf_total', totalRescued);
                localStorage.setItem('bf_high', highScore);
            }

            // ヘリコプターゴール到達判定
            if (player.x > heliPos - scroll - 100 && player.x < heliPos - scroll + 100) {
                if (rescued >= stageGoals[stage-1]) {
                    gameState = 'stageclear';
                    screenFlash = 30;
                    playSound(800, 0.5);
                    for (let j = 0; j < 50; j++) {
                        particles.push({
                            x: heliPos - scroll + 100,
                            y: H-300,
                            vx: (Math.random()-0.5)*8,
                            vy: (Math.random()-0.5)*8-2,
                            c: '#00ff00',
                            l: 40,
                            ml: 40
                        });
                    }
                } else {
                    gameState = 'gameover';
                    totalRescued += rescued;
                    localStorage.setItem('bf_total', totalRescued);
                }
            }

            obs = obs.filter(o => o.sx > scroll - 200);
            inj = inj.filter(i => i.sx > scroll - 200);
            items = items.filter(it => it.sx > scroll - 200);

            if (time % 40 === 0 && Math.random() < 0.3) {
                bgEffects.push({x: W, y: Math.random()*H*0.5, type: 'smoke', life: 60});
            }
        }

        function drawMedic(x, y) {
            let frame = Math.floor(player.frame / 8) % 4;
            let legOffset = [0, 4, 0, -4];

            // 軍服（オリーブドラブ）
            ctx.fillStyle = '#5a7a3a';
            ctx.fillRect(x+8, y+20, 48, 32);
            // 軍服の濃いシェード
            ctx.fillStyle = '#4a6a2a';
            ctx.fillRect(x+8, y+35, 48, 5);

            // 腕の振り（より大きく）
            let armX1 = 12 + (frame === 0 ? -8 : frame === 2 ? 8 : 0);
            let armX2 = 52 + (frame === 1 ? 8 : frame === 3 ? -8 : 0);

            ctx.fillStyle = '#d4a574';
            ctx.fillRect(x+armX1, y+22, 7, 22);
            ctx.fillRect(x+armX2, y+22, 7, 22);
            // 手
            ctx.fillStyle = '#e8b99a';
            ctx.fillRect(x+armX1, y+43, 7, 4);
            ctx.fillRect(x+armX2, y+43, 7, 4);

            // 脚（太い、動きを大きく）
            ctx.fillStyle = '#3a3a2a';
            ctx.fillRect(x+16, y+50+legOffset[frame]*1.5, 10, 16);
            ctx.fillRect(x+38, y+50-legOffset[frame]*1.5, 10, 16);
            // ブーツ
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x+16, y+66, 10, 4);
            ctx.fillRect(x+38, y+66, 10, 4);

            // 首
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(x+28, y+14, 8, 8);

            // 顔（より詳細）
            ctx.fillStyle = '#e8b99a';
            ctx.fillRect(x+22, y+2, 20, 12);
            // 目
            ctx.fillStyle = '#000000';
            ctx.fillRect(x+26, y+6, 2, 2);
            ctx.fillRect(x+36, y+6, 2, 2);

            // 白ヘルメット（より大きく、目立たせる）
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x+32, y+2, 14, 0, Math.PI, true);
            ctx.fill();
            ctx.fillRect(x+18, y+2, 28, 3);
            // ヘルメット側面
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(x+16, y+5, 3, 10);
            ctx.fillRect(x+48, y+5, 3, 10);

            // ヘルメット前面の赤十字（大きく）
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x+30, y+0, 3, 8);
            ctx.fillRect(x+27, y+3, 8, 3);
            // 十字の白枠
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x+28, y+1, 8, 6);

            // 医療バッグ（より大きく、より目立たせる）
            ctx.fillStyle = '#a0826d';
            ctx.fillRect(x+40, y+18, 24, 34);
            // バッグの濃いシェード
            ctx.fillStyle = '#8b6f47';
            ctx.fillRect(x+40, y+18, 24, 3);
            ctx.fillRect(x+62, y+18, 3, 34);
            // ポケット
            ctx.fillStyle = '#9a7657';
            ctx.fillRect(x+44, y+24, 16, 10);
            ctx.fillRect(x+44, y+38, 16, 10);

            // バッグの赤十字（大きく、目立たせる）
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x+51, y+26, 4, 10);
            ctx.fillRect(x+48, y+29, 10, 4);
            // 十字の白枠
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x+47, y+25, 12, 12);

            // HP表示（より大きく）
            ctx.fillStyle = '#ff0000';
            for (let i = 0; i < player.hp; i++) {
                ctx.fillRect(x+i*10, y-16, 7, 7);
                // HP枠
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.strokeRect(x+i*10, y-16, 7, 7);
            }

            // キャラ周囲に光のエフェクト
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(x+32, y+32, 45, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawInjuredSoldier(x, y, index) {
            // 倒れている兵士（より大きく、より詳細）
            ctx.fillStyle = '#5a7a3a';
            ctx.fillRect(x, y+25, 50, 20);
            // 軍服の濃いシェード
            ctx.fillStyle = '#4a6a2a';
            ctx.fillRect(x, y+40, 50, 4);

            // 頭
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(x-10, y, 18, 15);
            // 目
            ctx.fillStyle = '#000000';
            ctx.fillRect(x-4, y+5, 2, 2);
            ctx.fillRect(x+4, y+5, 2, 2);

            // 脚
            ctx.fillStyle = '#3a3a2a';
            ctx.fillRect(x+45, y+25, 8, 12);
            // ブーツ
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x+45, y+37, 8, 3);

            // 赤十字マーク（大きく、目立たせる）
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x+15, y+28, 3, 10);
            ctx.fillRect(x+12, y+31, 10, 3);
            // 十字の白枠
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x+11, y+27, 12, 12);

            // 点滅するSOS（より目立たせる）
            if (Math.floor(time / 10) % 2 === 0) {
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('救助!', x+24, y-15);
                // テキストの背景
                ctx.fillStyle = '#ffff00';
                ctx.globalAlpha = 0.5;
                ctx.fillRect(x+8, y-25, 32, 14);
                ctx.globalAlpha = 1;
            }

            // 点滅：危機感表現
            if (Math.floor(time / 20) % 2 === 0) {
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 3;
                ctx.strokeRect(x-2, y-2, 54, 44);
            }
        }

        function drawBg() {
            // レイヤー3: 山/遠景
            ctx.fillStyle = '#2a2a4a';
            let mountainOffset = (scroll * 0.3) % (W*2);
            ctx.beginPath();
            ctx.moveTo(-100-mountainOffset, H*0.25);
            ctx.lineTo(150-mountainOffset, 80);
            ctx.lineTo(400-mountainOffset, H*0.25);
            ctx.lineTo(700-mountainOffset, 120);
            ctx.lineTo(W+100-mountainOffset, H*0.25);
            ctx.lineTo(W+100, H*0.25);
            ctx.lineTo(-100, H*0.25);
            ctx.fill();

            // レイヤー2: 破壊された建物（より大きく、目立たせる）
            ctx.fillStyle = '#3a3a4a';
            let buildingOffset = (scroll * 0.6) % (W*2);
            for (let i = 0; i < 5; i++) {
                let bx = 250*i - buildingOffset;
                // 壊れた建物
                ctx.fillRect(bx, H*0.15, 120, 150);
                // 窓
                ctx.fillStyle = '#1a1a2a';
                for (let wy = 0; wy < 4; wy++) {
                    ctx.fillRect(bx+15, H*0.15+20+wy*30, 20, 18);
                    ctx.fillRect(bx+50, H*0.15+20+wy*30, 20, 18);
                    ctx.fillRect(bx+85, H*0.15+20+wy*30, 20, 18);
                }
                // 崩れた部分
                ctx.fillStyle = '#2a2a3a';
                ctx.fillRect(bx+40, H*0.15-20, 40, 20);
                ctx.fillStyle = '#3a3a4a';
            }

            // 爆撃跡・砲撃跡（大きく、目立たせる）
            ctx.fillStyle = '#1a1a2a';
            let craterOffset = (scroll * 0.5) % (W*2);
            for (let i = 0; i < 6; i++) {
                let cx = (i*400 - craterOffset);
                // 大きな爆撃跡
                ctx.beginPath();
                ctx.arc(cx, H*0.4, 80, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#0a0a1a';
                ctx.beginPath();
                ctx.arc(cx, H*0.4, 60, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a1a2a';
            }

            // ステージ別背景
            if (stage === 1) {
                // 海岸: 砂、クレーター
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(0, H*0.5, W, H*0.5);

                ctx.fillStyle = '#b8956a';
                for (let i = 0; i < 8; i++) {
                    let cx = ((scroll + i*300) % (W*2)) - W;
                    ctx.beginPath();
                    ctx.arc(cx, H*0.7, 40 + Math.sin(time/30+i)*5, 0, Math.PI*2);
                    ctx.fill();
                }

                // 土嚢
                ctx.fillStyle = '#8b7355';
                for (let i = 0; i < 4; i++) {
                    let sx = ((scroll + i*500) % (W*2)) - W;
                    ctx.fillRect(sx, H*0.65, 50, 30);
                }

            } else if (stage === 2) {
                // 塹壕: 泥、爆撃跡
                ctx.fillStyle = '#4a3a2a';
                ctx.fillRect(0, H*0.5, W, H*0.5);

                ctx.fillStyle = '#3a2a1a';
                for (let i = 0; i < 6; i++) {
                    let tx = ((scroll + i*400) % (W*2)) - W;
                    ctx.fillRect(tx, H*0.6, 60, 150);
                }

            } else {
                // 崖: 岩、焼け跡
                ctx.fillStyle = '#6a6a6a';
                ctx.fillRect(0, H*0.5, W, H*0.5);

                ctx.fillStyle = '#5a5a5a';
                for (let i = 0; i < 10; i++) {
                    let rx = ((scroll + i*200) % (W*2)) - W;
                    let ry = H*0.6 + Math.sin(i)*40;
                    ctx.beginPath();
                    ctx.arc(rx, ry, 30 + Math.cos(i)*10, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            // 地面パターン
            ctx.fillStyle = '#3a2a1a';
            for (let i = 0; i < 20; i++) {
                let fx = ((scroll + i*100) % (W*2)) - W;
                ctx.fillRect(fx, H-90, 50, 2);
            }

            ctx.fillStyle = '#2a1a0a';
            for (let i = 0; i < 15; i++) {
                let cx = ((scroll + i*150 + 50) % (W*2)) - W;
                ctx.beginPath();
                ctx.arc(cx, H-80, 5 + Math.sin(i)*2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function draw() {
            let shakeX = (Math.random() - 0.5) * screenShake;
            let shakeY = (Math.random() - 0.5) * screenShake;
            ctx.save();
            ctx.translate(shakeX, shakeY);
            screenShake *= 0.85;

            // 背景描画
            ctx.fillStyle = '#1a1a3a';
            ctx.fillRect(0, 0, W, H);
            drawBg();

            // レイヤー1: 煙
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#666666';
            bgEffects.forEach(e => {
                if (e.type === 'smoke') {
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, 50 + (60-e.life)*2, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            // ギミック描画（敵、より目立つ）
            obs.forEach(o => {
                if (o.sx > scroll - 200 && o.sx < scroll + W + 200) {
                    let dx = o.sx - scroll;
                    if (o.t === 'exp') {
                        // 砲撃（爆弾）
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 10;
                        ctx.fillStyle = '#ff2200';
                        ctx.fillRect(dx, o.sy, o.w, o.h);
                        ctx.fillStyle = '#ffaa00';
                        ctx.fillRect(dx+10, o.sy+10, o.w-20, o.h-20);
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(dx+20, o.sy+20, o.w-40, o.h-40);
                        // 危険の標識
                        ctx.strokeStyle = '#ff0000';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(dx-5, o.sy-5, o.w+10, o.h+10);
                        ctx.shadowColor = 'transparent';
                    } else if (o.t === 'mg') {
                        // 機銃掃射（危険！）
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 15;
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(dx, o.sy, o.w, o.h);
                        for (let i = 0; i < 10; i++) {
                            ctx.fillStyle = i%2 ? '#ff8800' : '#ffff00';
                            ctx.fillRect(dx+i*20, o.sy+5, 18, o.h-10);
                        }
                        // 警告ライン
                        ctx.strokeStyle = '#ff0000';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(dx, o.sy-10);
                        ctx.lineTo(dx+o.w, o.sy+o.h+10);
                        ctx.stroke();
                        ctx.shadowColor = 'transparent';
                    } else if (o.t === 'wire') {
                        // 有刺鉄線
                        ctx.shadowColor = '#8800ff';
                        ctx.shadowBlur = 8;
                        ctx.fillStyle = '#aa00ff';
                        ctx.fillRect(dx, o.sy, o.w, o.h);
                        ctx.fillStyle = '#ff0088';
                        for (let i = 0; i < 5; i++) {
                            for (let j = 0; j < 4; j++) {
                                ctx.fillRect(dx+i*12, o.sy+j*12, 3, 3);
                            }
                        }
                        // 危険の点々
                        ctx.fillStyle = '#ff00ff';
                        for (let i = 0; i < 6; i++) {
                            ctx.beginPath();
                            ctx.arc(dx+i*8, o.sy-3, 2, 0, Math.PI*2);
                            ctx.fill();
                        }
                        ctx.shadowColor = 'transparent';
                    }
                }
            });

            // 負傷兵描画
            inj.forEach(i => {
                if (i.sx > scroll - 200 && i.sx < scroll + W + 200 && !i.res) {
                    let dx = i.sx - scroll;
                    drawInjuredSoldier(dx, i.sy, 0);
                }
            });

            // アイテム描画
            items.forEach(it => {
                if (it.sx > scroll - 200 && it.sx < scroll + W + 200) {
                    let dx = it.sx - scroll;
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(dx+5, it.sy+10, 10, 8);
                    ctx.fillRect(dx+15, it.sy+10, 10, 8);
                    ctx.fillStyle = '#ff8800';
                    ctx.fillRect(dx+5, it.sy+18, 10, 3);
                    ctx.fillRect(dx+15, it.sy+18, 10, 3);
                }
            });

            // パーティクル
            particles.forEach(p => {
                ctx.globalAlpha = p.l / p.ml;
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x-2, p.y-2, 4, 4);
            });
            ctx.globalAlpha = 1;

            // プレイヤー描画
            if (player.inv % 10 < 5 || player.inv === 0) {
                drawMedic(player.x, player.y);
            }

            // UI
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 20px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`ステージ:${stage}`, 30, 50);
            let distToHeli = Math.max(0, heliPos - scroll);
            ctx.fillText(`距離:${Math.floor(distToHeli/100)}`, 30, 80);
            ctx.fillText(`救助:${rescued}/${stageGoals[stage-1]}人`, 30, 110);
            ctx.textAlign = 'right';
            ctx.fillText(`スコア:${score}`, W-30, 50);
            ctx.fillText(`最高:${highScore}`, W-30, 80);

            // 救助テキスト
            if (rescueText && rescueText.show) {
                let alpha = rescueText.t / 25;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = rescueText.multiplier > 1 ? '#ffff00' : '#00ff00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 24px monospace';
                ctx.fillText('救助成功！', rescueText.x-scroll, rescueText.y);
                ctx.font = 'bold 18px monospace';
                ctx.fillText(`+${100*rescueText.multiplier}`, rescueText.x-scroll, rescueText.y+30);
                ctx.globalAlpha = 1;
            }

            // COMBO
            if (comboText && comboText.show && comboText.combo > 1) {
                let alpha = comboText.t / 40;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffff00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 32px monospace';
                ctx.fillText(`コンボ x${comboText.combo}`, comboText.x, comboText.y);
                ctx.globalAlpha = 1;
            }

            // ヘリコプター（ゴール地点、明確で目立つ）
            let heliScreenX = heliPos - scroll;
            if (heliScreenX > -400 && heliScreenX < W + 400) {
                let heliSize = 180;
                let heliY = H - 400;

                // ゴール地点の光
                ctx.globalAlpha = 0.15;
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(heliScreenX, heliY+heliSize*0.3, 250, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // 本体（大型、目立つ色）
                ctx.fillStyle = '#00dd00';
                ctx.fillRect(heliScreenX-heliSize/2, heliY, heliSize, heliSize*0.6);
                // 本体のシェード
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(heliScreenX-heliSize/2, heliY+heliSize*0.4, heliSize, heliSize*0.2);

                // キャビン（より目立つ色）
                ctx.fillStyle = '#0099ff';
                ctx.fillRect(heliScreenX-heliSize/3, heliY+20, heliSize*0.6, heliSize*0.3);
                // キャビンの窓
                ctx.fillStyle = '#000044';
                ctx.fillRect(heliScreenX-heliSize/3+10, heliY+28, 15, 12);
                ctx.fillRect(heliScreenX-heliSize/3+35, heliY+28, 15, 12);

                // ローター（回転アニメーション、より目立つ）
                ctx.strokeStyle = '#444444';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(heliScreenX-heliSize*0.7, heliY-60);
                ctx.lineTo(heliScreenX+heliSize*0.7, heliY-60);
                ctx.stroke();

                ctx.strokeStyle = '#444444';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(heliScreenX, heliY-140);
                ctx.lineTo(heliScreenX, heliY);
                ctx.stroke();

                // ローターの回転ブレード
                ctx.strokeStyle = '#666666';
                ctx.lineWidth = 3;
                let bladeAngle = (time / 3) % Math.PI;
                for (let i = 0; i < 2; i++) {
                    let angle = bladeAngle + i * Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(heliScreenX + Math.cos(angle)*heliSize*0.7, heliY-60 + Math.sin(angle)*20);
                    ctx.lineTo(heliScreenX - Math.cos(angle)*heliSize*0.7, heliY-60 - Math.sin(angle)*20);
                    ctx.stroke();
                }

                // 着陸灯（明るく点滅）
                let lightOn = Math.floor(time/8) % 2 === 0;
                if (lightOn) {
                    ctx.fillStyle = '#ff3333';
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(heliScreenX-heliSize/3, heliY+heliSize*0.6-10, 10, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowColor = 'transparent';

                    ctx.fillStyle = '#33ff33';
                    ctx.shadowColor = '#00ff00';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(heliScreenX+heliSize/3, heliY+heliSize*0.6-10, 10, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowColor = 'transparent';
                }

                // 着陸用ロープ（複数、目立つ）
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 3;
                for (let rope = -1; rope <= 1; rope++) {
                    ctx.beginPath();
                    ctx.moveTo(heliScreenX+rope*40, heliY+heliSize*0.6);
                    ctx.lineTo(heliScreenX+rope*40, H-80);
                    ctx.stroke();
                }

                // メインラベル（大きく、目立つ）
                ctx.fillStyle = '#ffff00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 32px monospace';
                ctx.fillText('脱出ヘリ', heliScreenX, heliY-160);
                // ラベルの背景
                ctx.fillStyle = '#000000';
                ctx.globalAlpha = 0.7;
                ctx.fillRect(heliScreenX-80, heliY-175, 160, 30);
                ctx.globalAlpha = 1;

                // 矢印：向かうべき場所
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(heliScreenX-60, heliY-190);
                ctx.lineTo(heliScreenX, heliY-160);
                ctx.lineTo(heliScreenX+60, heliY-190);
                ctx.stroke();
            }

            // ゴール接近メッセージ表示
            if (goalMessage) {
                ctx.fillStyle = '#ffff00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 36px monospace';
                ctx.fillText(goalMessage, W/2, 150);
            }

            ctx.restore();

            // フラッシュ
            if (screenFlash > 0) {
                ctx.globalAlpha = Math.min(1, screenFlash / 20) * 0.7;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(0, 0, W, H);
                ctx.globalAlpha = 1;
                screenFlash -= 1;
            }

            // ゲーム状態表示
            if (gameState === 'start' || gameState === 'gameover' || gameState === 'stageclear') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#00ff00';
                ctx.textAlign = 'center';
                ctx.font = 'bold 48px monospace';

                if (gameState === 'start') {
                    ctx.fillText('戦場の衛生兵', W/2, H/2-100);
                    ctx.fillText('==========', W/2, H/2-30);
                    ctx.font = '28px monospace';
                    ctx.fillText('命を救え。', W/2, H/2+50);
                    ctx.fillText('敵は倒すな。', W/2, H/2+100);
                    ctx.font = '24px monospace';
                    ctx.fillText('[スタートをタップ]', W/2, H/2+200);
                } else if (gameState === 'gameover') {
                    if (rescued < stageGoals[stage-1]) {
                        ctx.fillText('脱出失敗', W/2, H/2-150);
                        ctx.font = '20px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText(`必要な救助人数: ${stageGoals[stage-1]} 人`, W/2, H/2-50);
                        ctx.fillText(`救助した人数: ${rescued} 人`, W/2, H/2);
                        ctx.fillText(`あと ${stageGoals[stage-1] - rescued} 人足りません`, W/2, H/2+50);
                    } else {
                        ctx.fillText('ゲームオーバー', W/2, H/2-150);
                        ctx.font = '20px monospace';
                        ctx.textAlign = 'left';
                        ctx.fillText(`救助: ${rescued} 人`, 100, H/2-20);
                        ctx.fillText(`被弾: ${damageCount} 回`, 100, H/2+30);
                        ctx.fillText(`スコア: ${score} ポイント`, 100, H/2+80);
                        ctx.fillText(`最高記録: ${highScore} ポイント`, 100, H/2+130);
                    }
                    ctx.textAlign = 'center';
                    ctx.font = '24px monospace';
                    ctx.fillText('[リスタートをタップ]', W/2, H/2+250);
                } else if (gameState === 'stageclear') {
                    ctx.fillText('ステージクリア', W/2, H/2-150);
                    ctx.font = '20px monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText(`救助: ${rescued} 人`, 100, H/2-20);
                    ctx.fillText(`被弾: ${damageCount} 回`, 100, H/2+30);
                    ctx.fillText(`スコア: ${score} ポイント`, 100, H/2+80);
                    ctx.fillText(`最高記録: ${highScore} ポイント`, 100, H/2+130);
                    ctx.textAlign = 'center';
                    ctx.font = '24px monospace';
                    if (stage < 3) ctx.fillText('[次のステージをタップ]', W/2, H/2+250);
                    else ctx.fillText('[ミッション完了]', W/2, H/2+250);
                }
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
